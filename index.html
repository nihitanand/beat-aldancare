function App() {
  const [data, setData]       = useState({doctors:[], bizplan:{}, bizFieldDefs:[], crmplan:{}});
  const [usersData, setUsersData] = useState({
    amit:  {tourplan:{}, actual:{}},
    nitu:  {tourplan:{}, actual:{}},
    nihit: {tourplan:{}, actual:{}},
  });
  const [loaded, setLoaded]   = useState(false);
  const [syncSt, setSyncSt]   = useState("connecting");
  const [tab, setTab]         = useState("tourplan");
  const [isAdmin, setIsAdmin] = useState(false);
  const [adminModal, setAdminModal] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [toast, setToast]     = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [tpMonth, setTpMonth] = useState("2026-06");
  const [avMonth, setAvMonth] = useState("2026-06");
  const [bpMonth, setBpMonth] = useState("2026-06");
  const [cpMonth, setCpMonth] = useState("2026-06");

  const [currentUserId, setCurrentUserId] = useState(function(){
    try { return localStorage.getItem("aldan_beat_user")||"amit"; } catch(e){ return "amit"; }
  });
  const [userModal, setUserModal] = useState(false);
  const [pinInput, setPinInput]   = useState("");
  const [pinOk, setPinOk]         = useState(false);

  const currentUser        = USERS.find(function(u){ return u.id===currentUserId; }) || USERS[0];
  const availableCompanions = USER_COMPANIONS[currentUserId] || USER_COMPANIONS.amit;
  const currentTP           = ((usersData[currentUserId])||{}).tourplan || {};
  const currentActual       = ((usersData[currentUserId])||{}).actual   || {};

  useEffect(function() {
    var ref = DB.ref(DB_PATH);
    ref.on("value", function(snap) {
      try {
        var raw = snap.val();
        if (raw === null) {
          var seed = SEED_DATA();
          var seedUp = {};
          seedUp["alderma/v1/doctors"]              = seed.doctors;
          seedUp["alderma/v1/bizFieldDefs"]         = seed.bizFieldDefs;
          seedUp["alderma/v1/bizplan"]              = {};
          seedUp["alderma/v1/crmplan"]              = {};
          seedUp["alderma/v1/users/amit/tourplan"]  = seed.tourplan;
          seedUp["alderma/v1/users/amit/actual"]    = {};
          seedUp["alderma/v1/users/nitu/tourplan"]  = {};
          seedUp["alderma/v1/users/nitu/actual"]    = {};
          seedUp["alderma/v1/users/nihit/tourplan"] = {};
          seedUp["alderma/v1/users/nihit/actual"]   = {};
          DB.ref().update(seedUp).catch(console.error);
        } else {
          setData({
            doctors:     toArr(raw.doctors),
            bizplan:     toObj(raw.bizplan),
            bizFieldDefs:toArr(raw.bizFieldDefs),
            crmplan:     toObj(raw.crmplan),
          });
          var rawUsers = toObj(raw.users);
          function getUD(uid2) {
            var u = rawUsers[uid2] || {};
            return { tourplan: toObj(u.tourplan), actual: toObj(u.actual) };
          }
          var amitUD = getUD("amit");
          var hasAmitTP = Object.keys(amitUD.tourplan).length > 0;
          var hasAmitAc = Object.keys(amitUD.actual).length > 0;
          if (!hasAmitTP && !hasAmitAc && (raw.tourplan || raw.actual)) {
            var mig = {};
            if (raw.tourplan) mig["alderma/v1/users/amit/tourplan"] = raw.tourplan;
            if (raw.actual)   mig["alderma/v1/users/amit/actual"]   = raw.actual;
            DB.ref().update(mig).catch(console.error);
          } else {
            setUsersData({ amit: getUD("amit"), nitu: getUD("nitu"), nihit: getUD("nihit") });
            setLoaded(true);
            setSyncSt("synced");
          }
        }
      } catch(err) { console.error("Read error:", err); setSyncSt("error"); setLoaded(true); }
    }, function(err) { console.error(err); setSyncSt("error"); setLoaded(true); });
    return function() { ref.off(); };
  }, []);

  var saveMulti = function(updates) {
    setSyncSt("saving");
    DB.ref().update(updates).then(function(){setSyncSt("synced");}).catch(function(e){console.error(e);setSyncSt("error");});
  };

  var notify = function(msg, c) { c=c||"green"; setToast({msg,c}); setTimeout(function(){setToast(null);},2600); };
  var ask    = function(msg, onOk) { setConfirm({msg, onOk:function(){onOk(); setConfirm(null);}}); };

  var saveDoctors = function(list) { saveMulti({"alderma/v1/doctors": list}); };

  var toggleTourplan = function(docId, day) {
    var tp = JSON.parse(JSON.stringify(currentTP));
    if (!tp[tpMonth]) tp[tpMonth] = {};
    if (!tp[tpMonth][docId]) tp[tpMonth][docId] = {};
    var cur = tpEntryOf(tp[tpMonth][docId][day]);
    if (cur.planned) {
      delete tp[tpMonth][docId][day];
    } else {
      tp[tpMonth][docId][day] = {planned: true, companions: cur.companions};
    }
    var u = {}; u["alderma/v1/users/"+currentUserId+"/tourplan"] = tp;
    saveMulti(u);
  };

  var setTPCompanions = function(docId, day, companions) {
    var updates = {};
    // Update current user's TP entry companions
    var tp = JSON.parse(JSON.stringify(currentTP));
    if (!tp[tpMonth]) tp[tpMonth] = {};
    if (!tp[tpMonth][docId]) tp[tpMonth][docId] = {};
    var cur = tpEntryOf(tp[tpMonth][docId][day]);
    tp[tpMonth][docId][day] = {planned: cur.planned, companions: companions};
    updates["alderma/v1/users/"+currentUserId+"/tourplan"] = tp;
    // Sync to companion users: add newly added, remove removed
    var prevComps = cur.companions;
    var added   = companions.filter(function(c){ return !prevComps.includes(c); });
    var removed = prevComps.filter(function(c){ return !companions.includes(c); });
    Array.from(new Set(added.concat(removed))).forEach(function(c) {
      var cuid = COMPANION_TO_USER[c];
      if (!cuid) return;
      var ctp = JSON.parse(JSON.stringify(((usersData[cuid])||{}).tourplan || {}));
      if (!ctp[tpMonth]) ctp[tpMonth] = {};
      if (!ctp[tpMonth][docId]) ctp[tpMonth][docId] = {};
      var cEntry = tpEntryOf(ctp[tpMonth][docId][day]);
      if (companions.includes(c)) {
        // newly added → plan this doctor for companion user too
        ctp[tpMonth][docId][day] = {planned: true, companions: cEntry.companions};
      } else {
        // removed → remove from companion user's TP
        if (!cEntry.planned || Object.keys(ctp[tpMonth][docId]).length <= 1) {
          delete ctp[tpMonth][docId][day];
        } else {
          ctp[tpMonth][docId][day] = {planned: false, companions: cEntry.companions};
          delete ctp[tpMonth][docId][day];
        }
      }
      updates["alderma/v1/users/"+cuid+"/tourplan"] = ctp;
    });
    saveMulti(updates);
  };

  var addDoctorsToTP = function(ids, day, isDaily, companions) {
    var compUids = (companions||[]).map(function(c){ return COMPANION_TO_USER[c]; }).filter(Boolean);
    var targetIds = Array.from(new Set([currentUserId].concat(compUids)));
    var updates = {};
    targetIds.forEach(function(uid2) {
      var tp = JSON.parse(JSON.stringify(((usersData[uid2])||{}).tourplan || {}));
      if (!tp[tpMonth]) tp[tpMonth] = {};
      ids.forEach(function(id) {
        if (!tp[tpMonth][id]) tp[tpMonth][id] = {};
        if (isDaily) {
          var cur = tpEntryOf(tp[tpMonth][id][day]);
          // For current user store companions; for companion users, no nested companions
          var comps = uid2===currentUserId ? companions : [];
          tp[tpMonth][id][day] = {planned: true, companions: comps};
        }
      });
      updates["alderma/v1/users/"+uid2+"/tourplan"] = tp;
    });
    saveMulti(updates);
  };

  var removeDoctorFromTP = function(docId) {
    var tp = JSON.parse(JSON.stringify(currentTP));
    if (tp[tpMonth]) delete tp[tpMonth][docId];
    var u = {}; u["alderma/v1/users/"+currentUserId+"/tourplan"] = tp;
    saveMulti(u);
  };

  var toggleActual = function(docId, day, force) {
    var updates = {};
    var ac = JSON.parse(JSON.stringify(currentActual));
    if (!ac[avMonth]) ac[avMonth] = {};
    if (!ac[avMonth][docId]) ac[avMonth][docId] = {};
    var cur = visitOf(ac[avMonth][docId][day]);
    var nextDone = force ? true : !cur.done;
    if (!nextDone && cur.companions.length===0) { delete ac[avMonth][docId][day]; }
    else { ac[avMonth][docId][day] = {done: nextDone, companions: cur.companions}; }
    updates["alderma/v1/users/"+currentUserId+"/actual"] = ac;
    cur.companions.forEach(function(c) {
      var cuid = COMPANION_TO_USER[c];
      if (!cuid) return;
      var cac = JSON.parse(JSON.stringify(((usersData[cuid])||{}).actual || {}));
      if (!cac[avMonth]) cac[avMonth] = {};
      if (!cac[avMonth][docId]) cac[avMonth][docId] = {};
      var myLabel = USER_COMPANION_LABEL[currentUserId] || currentUser.name;
      if (!nextDone) {
        var excv = visitOf(cac[avMonth][docId][day]);
        var newC = excv.companions.filter(function(x){ return x!==myLabel; });
        if (!excv.done && newC.length===0) { delete cac[avMonth][docId][day]; }
        else { cac[avMonth][docId][day] = {done: excv.done, companions: newC}; }
      } else {
        var excv2 = visitOf(cac[avMonth][docId][day]);
        var newC2 = excv2.companions.includes(myLabel) ? excv2.companions : excv2.companions.concat([myLabel]);
        cac[avMonth][docId][day] = {done: true, companions: newC2};
      }
      updates["alderma/v1/users/"+cuid+"/actual"] = cac;
    });
    saveMulti(updates);
  };

  var setCompanions = function(docId, day, companions) {
    var updates = {};
    var ac = JSON.parse(JSON.stringify(currentActual));
    if (!ac[avMonth]) ac[avMonth] = {};
    if (!ac[avMonth][docId]) ac[avMonth][docId] = {};
    var cur = visitOf(ac[avMonth][docId][day]);
    var prevComps = cur.companions;
    if (!cur.done && companions.length===0) { delete ac[avMonth][docId][day]; }
    else { ac[avMonth][docId][day] = {done: cur.done, companions: companions}; }
    updates["alderma/v1/users/"+currentUserId+"/actual"] = ac;
    var myLabel = USER_COMPANION_LABEL[currentUserId] || currentUser.name;
    var added   = companions.filter(function(c){ return !prevComps.includes(c); });
    var removed = prevComps.filter(function(c){ return !companions.includes(c); });
    Array.from(new Set(added.concat(removed))).forEach(function(c) {
      var cuid = COMPANION_TO_USER[c];
      if (!cuid) return;
      var cac = JSON.parse(JSON.stringify(((usersData[cuid])||{}).actual || {}));
      if (!cac[avMonth]) cac[avMonth] = {};
      if (!cac[avMonth][docId]) cac[avMonth][docId] = {};
      var excv = visitOf(cac[avMonth][docId][day]);
      if (companions.includes(c)) {
        if (cur.done) {
          var nc = excv.companions.includes(myLabel) ? excv.companions : excv.companions.concat([myLabel]);
          cac[avMonth][docId][day] = {done: true, companions: nc};
        }
      } else {
        var nc2 = excv.companions.filter(function(x){ return x!==myLabel; });
        if (!excv.done && nc2.length===0) { delete cac[avMonth][docId][day]; }
        else { cac[avMonth][docId][day] = {done: excv.done, companions: nc2}; }
      }
      updates["alderma/v1/users/"+cuid+"/actual"] = cac;
    });
    saveMulti(updates);
  };

  var clearPlan = function(docId) {
    var tp = JSON.parse(JSON.stringify(currentTP));
    if (tp[avMonth]) delete tp[avMonth][docId];
    var u = {}; u["alderma/v1/users/"+currentUserId+"/tourplan"] = tp;
    saveMulti(u);
  };

  var saveBizEntry = function(docId, form) {
    var updates = {};
    updates["alderma/v1/bizplan/"+bpMonth+"/"+docId] = form;
    var newDocs = data.doctors.map(function(d){ return d.id===docId ? Object.assign({},d,{crmYN:form.crmYN||d.crmYN,crmAmt:Number(form.crmAmt)||d.crmAmt,priority:form.priority||d.priority}) : d; });
    updates["alderma/v1/doctors"] = newDocs;
    if (form.crmYN==="Yes" && form.tentativeCrmMonth) {
      var cpKey = form.tentativeCrmMonth;
      var cpList = toArr(data.crmplan[cpKey]);
      var doc = newDocs.find(function(d){ return d.id===docId; });
      var ei = cpList.findIndex(function(e){ return e.doctorId===docId; });
      var entry = {
        id: ei>=0 ? cpList[ei].id : uid(),
        doctorId: docId, doctorName: doc?doc.name:"", mdl: doc?doc.mdl||"":"", area: doc?doc.area||"":"",
        crmPlanDate: ei>=0 ? cpList[ei].crmPlanDate : cpKey+"-01",
        crmAmt: Number(form.crmAmt)||0, tentativeBizPM: Number(form.tentativeBiz)||0,
        actualMonth: ei>=0 ? cpList[ei].actualMonth : "",
      };
      updates["alderma/v1/crmplan/"+cpKey] = ei>=0 ? cpList.map(function(e,i){ return i===ei?entry:e; }) : cpList.concat([entry]);
    } else {
      // Even without CRM=Yes, sync tentativeBiz to existing CRM entry if one exists
      var cpList2 = toArr(data.crmplan[bpMonth]);
      var ei2 = cpList2.findIndex(function(e){ return e.doctorId===docId; });
      if (ei2>=0 && form.tentativeBiz) {
        var updList = cpList2.map(function(e,i){ return i===ei2 ? Object.assign({},e,{tentativeBizPM:Number(form.tentativeBiz)||0}) : e; });
        updates["alderma/v1/crmplan/"+bpMonth] = updList;
      }
    }
    saveMulti(updates);
    notify("Business plan updated!");
  };


  var addBizField = function(field) { saveMulti({"alderma/v1/bizFieldDefs": data.bizFieldDefs.concat([field])}); };

  var saveCrm = function(list, monthKey) {
    var mk = monthKey||cpMonth;
    var u = {}; u["alderma/v1/crmplan/"+mk] = list;
    // Sync tentativeBizPM back to each doctor's bizplan entry for that month
    list.forEach(function(e) {
      if (!e.doctorId) return;
      var existing = toObj(data.bizplan[mk]);
      var docEntry = toObj(existing[e.doctorId]);
      if (Object.keys(docEntry).length > 0 || Number(e.tentativeBizPM) > 0) {
        u["alderma/v1/bizplan/"+mk+"/"+e.doctorId+"/tentativeBiz"] = String(e.tentativeBizPM||0);
      }
    });
    saveMulti(u);
  };

  var saveDoctorPriority = function(docId, priority) {
    saveMulti({"alderma/v1/doctors": data.doctors.map(function(d){ return d.id===docId?Object.assign({},d,{priority}):d; })});
  };

  var tryAdminLogin = function() {
    if (pwInput === ADMIN_PASS) { setIsAdmin(true); setAdminModal(false); setPwInput(""); notify("Admin mode unlocked"); }
    else { notify("Wrong password","red"); }
  };

  var tryPin = function() {
    if (pinInput===USER_PIN) { setPinOk(true); notify("PIN accepted"); }
    else { notify("Wrong PIN","red"); setPinInput(""); }
  };

  var tryUserSwitch = function(newId) {
    if (pinOk) {
      setCurrentUserId(newId);
      try { localStorage.setItem("aldan_beat_user", newId); } catch(e){}
      setUserModal(false); setPinInput(""); setPinOk(false);
      notify("Switched to "+(USERS.find(function(u){ return u.id===newId; })||{}).name);
    } else { notify("Enter PIN first","red"); }
  };

  const TABS = [
    ["tourplan","🗓️","Tour Plan"],
    ["actual","✅","Visits"],
    ["bizplan","📊","Biz Plan"],
    ["crmplan","💰","CRM"],
    ["doctors","👨‍⚕️","Doctors"],
    ["reports","📑","Reports"],
  ];

  if (!loaded) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-4 bg-gray-50">
      <div className="text-5xl animate-bounce">🩺</div>
      <p className="font-bold text-gray-600 text-lg">Connecting to Aldan Beat…</p>
      {syncSt==="error" && (
        <div className="bg-red-50 border border-red-200 rounded-xl px-6 py-4 max-w-sm text-center mt-2">
          <p className="text-red-700 font-bold">⚠️ Firebase connection failed</p>
        </div>
      )}
    </div>
  );

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",background:"#f9fafb"}}>
      {toast && (
        <div className={`fixed top-4 right-4 z-[100] px-4 py-2.5 rounded-xl text-white text-sm font-bold shadow-xl ${toast.c==="green"?"bg-emerald-500":toast.c==="red"?"bg-red-500":"bg-teal-500"}`}>{toast.msg}</div>
      )}
      <Confirm open={!!confirm} msg={confirm ? confirm.msg : ""} onOk={confirm ? confirm.onOk : null} onCancel={function(){setConfirm(null);}}/>

      <nav className="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-40 shadow-sm flex-wrap gap-2">
        <div>
          <span className="text-lg font-black text-teal-700">🩺 Aldan Beat</span>
          <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest -mt-0.5">
            {(tab==="tourplan"?monthLabel(tpMonth):tab==="actual"?monthLabel(avMonth):tab==="bizplan"?monthLabel(bpMonth):tab==="crmplan"?monthLabel(cpMonth):"")}
            {(tab==="tourplan"||tab==="actual"||tab==="bizplan"||tab==="crmplan") && " · "}{APP_VERSION}
          </div>
        </div>
        <div className="flex items-center gap-2">
          <span className={`text-xs px-2 py-1 rounded-full font-semibold ${syncSt==="synced"?"bg-emerald-100 text-emerald-700":syncSt==="saving"?"bg-amber-100 text-amber-700":"bg-red-100 text-red-600"}`}>
            {syncSt==="synced"?"● Live":syncSt==="saving"?"⟳ Saving":"✕ Error"}
          </span>
          <button onClick={function(){setUserModal(true);setPinInput("");setPinOk(false);}}
            className="bg-indigo-50 text-indigo-700 border border-indigo-200 px-3 py-1.5 rounded-lg text-xs font-bold">
            👤 {currentUser.name}
          </button>
          {isAdmin
            ? <button onClick={function(){setIsAdmin(false);}} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">🔓 Admin</button>
            : <button onClick={function(){setAdminModal(true);}} className="bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg text-xs font-bold">🔒</button>}
          <button onClick={function(){window.location.reload(true);}} title="Force refresh" className="text-gray-400 hover:text-teal-600 text-lg font-bold px-1">↻</button>
        </div>
      </nav>

      <div className="max-w-6xl mx-auto px-4 py-5 w-full" style={{flex:"1 1 0",overflowY:"auto",overflowX:"hidden",boxSizing:"border-box"}}>
        {tab==="doctors"  && <DoctorMasterTab doctors={data.doctors} isAdmin={isAdmin} onSave={saveDoctors} notify={notify} ask={ask}/>}
        {tab==="tourplan" && <TourPlanTab doctors={data.doctors} tourplan={currentTP} month={tpMonth} setMonth={setTpMonth} onToggle={toggleTourplan} onAddDoctorsToTP={addDoctorsToTP} onRemoveDoctorFromTP={removeDoctorFromTP} onSetTPCompanions={setTPCompanions} availableCompanions={availableCompanions}/>}
        {tab==="actual"   && <ActualVisitsTab doctors={data.doctors} tourplan={currentTP} actual={currentActual} month={avMonth} setMonth={setAvMonth} onToggleActual={toggleActual} onSetCompanions={setCompanions} onClearPlan={clearPlan} mode={isAdmin?"admin":"rep"} availableCompanions={availableCompanions}/>}
        {tab==="bizplan"  && <BusinessPlanTab doctors={data.doctors} bizplan={data.bizplan} bizFieldDefs={data.bizFieldDefs} month={bpMonth} setMonth={setBpMonth} onSaveEntry={saveBizEntry} onAddField={addBizField} isAdmin={isAdmin} notify={notify}/>}
        {tab==="crmplan"  && <CrmPlanTab doctors={data.doctors} crmplan={data.crmplan} month={cpMonth} setMonth={setCpMonth} onSave={saveCrm} onSavePriority={saveDoctorPriority} notify={notify} ask={ask}/>}
        {tab==="reports"  && <ReportsTab doctors={data.doctors} bizplan={data.bizplan} bizFieldDefs={data.bizFieldDefs} crmplan={data.crmplan}/>}
      </div>

      <nav className="bg-white border-t border-gray-200 flex flex-shrink-0" style={{boxShadow:"0 -2px 10px rgba(0,0,0,0.05)",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {TABS.map(function([t,icon,lbl]){ return (
          <button key={t} onClick={function(){setTab(t);}} className={`flex-1 flex flex-col items-center justify-center py-1.5 gap-0.5 relative ${tab===t?"text-teal-700":"text-gray-400"}`}>
            {tab===t && <span className="absolute top-0 left-2 right-2 h-0.5 bg-teal-600 rounded-full"/>}
            <span className={`flex items-center justify-center w-8 h-8 rounded-xl text-base leading-none ${tab===t?"bg-teal-50":""}`}>{icon}</span>
            <span className={`text-[9px] leading-none ${tab===t?"font-black":"font-bold"}`}>{lbl}</span>
          </button>
        );})}
      </nav>

      <Modal open={userModal} onClose={function(){setUserModal(false);setPinInput("");setPinOk(false);}} title="👤 Switch User">
        <div className="space-y-4">
          {!pinOk ? (
            <div>
              <Fld label="Enter PIN to unlock">
                <input type="password" value={pinInput} onChange={function(e){setPinInput(e.target.value);}}
                  onKeyDown={function(e){if(e.key==="Enter")tryPin();}} className={INP} autoFocus placeholder="4-digit PIN"/>
              </Fld>
              <div className="flex gap-3 pt-3">
                <button onClick={function(){setUserModal(false);setPinInput("");}} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold">Cancel</button>
                <button onClick={tryPin} disabled={!pinInput} className="flex-1 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-bold disabled:opacity-40">Unlock</button>
              </div>
            </div>
          ) : (
            <div>
              <p className="text-xs text-gray-400 mb-3">Select user to switch to:</p>
              <div className="space-y-2">
                {USERS.map(function(u){ return (
                  <button key={u.id} onClick={function(){tryUserSwitch(u.id);}}
                    className={`w-full flex items-center justify-between px-4 py-3 rounded-xl border text-left ${currentUserId===u.id?"border-teal-300 bg-teal-50":"border-gray-100 bg-gray-50 hover:bg-gray-100"}`}>
                    <div>
                      <p className="font-bold text-gray-800">{u.name}</p>
                      <p className="text-xs text-gray-400">{u.role}</p>
                    </div>
                    {currentUserId===u.id && <span className="text-teal-600 font-bold text-xs">Current</span>}
                  </button>
                );})}
              </div>
            </div>
          )}
        </div>
      </Modal>

      <Modal open={adminModal} onClose={function(){setAdminModal(false);}} title="🔒 Admin Login">
        <div className="space-y-4">
          <Fld label="Admin Password">
            <input type="password" value={pwInput} onChange={function(e){setPwInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")tryAdminLogin();}} className={INP} autoFocus/>
          </Fld>
          <div className="flex gap-3">
            <button onClick={function(){setAdminModal(false);}} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
            <button onClick={tryAdminLogin} className="flex-1 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-bold hover:bg-teal-700">Unlock</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>
</body>
</html>
