const INP = "w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-300 bg-white";

function Fld({label, children}) {
  return <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">{label}</label>{children}</div>;
}

function Modal({open,onClose,title,children,wide,noPad}) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center p-4 overflow-y-auto" style={{background:"rgba(15,23,42,0.65)"}}>
      <div className={`bg-white rounded-2xl shadow-2xl w-full my-6 ${wide?"max-w-2xl":"max-w-md"}`}>
        <div className="flex justify-between items-center px-6 pt-5 pb-4 border-b border-gray-100">
          <h2 className="text-base font-bold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-700 text-xl font-bold">✕</button>
        </div>
        <div className={noPad?"":"px-6 py-5"}>{children}</div>
      </div>
    </div>
  );
}

function Confirm({open,msg,onOk,onCancel}) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.65)"}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
        <div className="text-3xl text-center mb-3">⚠️</div>
        <p className="text-center text-gray-700 font-semibold mb-5">{msg}</p>
        <div className="flex gap-3">
          <button onClick={onCancel} className="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-xl text-sm font-semibold hover:bg-gray-200">Cancel</button>
          <button onClick={onOk} className="flex-1 py-2.5 bg-red-600 text-white rounded-xl text-sm font-semibold hover:bg-red-700">Delete</button>
        </div>
      </div>
    </div>
  );
}

function MonthPicker({value,onChange}) {

    className="px-3 py-1.5 border border-gray-200 rounded-lg text-sm font-bold text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-300 bg-white"/>;
}

function PriBadge({p}) {

/* ══════════════════════════════════
   MULTI-SELECT DOCTOR PICKER
══════════════════════════════════ */
function MultiSelectPicker({doctors, onConfirm, onClose, title}) {
  const [search, setSearch] = useState("");
  const [sel, setSel] = useState(new Set());
  const areas = useMemo(()=>Array.from(new Set(doctors.map(d=>d.area).filter(Boolean))),[doctors]);
  const [areaF, setAreaF] = useState("All");
  const toggle = (id) => setSel(p=>{ const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });
  const filtered = doctors.filter(d=>(areaF==="All"||d.area===areaF)&&d.name.toLowerCase().includes(search.toLowerCase()));
  return (
    <div className="fixed inset-0 z-[70] flex items-start justify-center p-4 overflow-y-auto" style={{background:"rgba(15,23,42,0.72)"}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md my-6">
        <div className="flex justify-between items-center px-5 pt-5 pb-3 border-b border-gray-100">
          <h2 className="text-sm font-bold text-gray-800">{title||"Select Doctors"}</h2>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-700 text-xl font-bold">✕</button>
        </div>
        <div className="px-4 pt-3 pb-2 space-y-2">
          <input placeholder="Search name or MDL…" value={search} onChange={e=>setSearch(e.target.value)} className={INP} autoFocus/>
          <div className="flex gap-1.5 flex-wrap">
            <button onClick={()=>setAreaF("All")} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border ${areaF==="All"?"bg-teal-600 text-white border-teal-600":"bg-white text-gray-400 border-gray-200"}`}>All</button>
            {areas.map(a=><button key={a} onClick={()=>setAreaF(a)} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border ${areaF===a?"bg-teal-600 text-white border-teal-600":"bg-white text-gray-400 border-gray-200"}`}>{a}</button>)}
          </div>
          {sel.size>0 && <p className="text-xs text-teal-700 font-bold">{sel.size} selected</p>}
        </div>
        <div className="max-h-60 overflow-y-auto divide-y divide-gray-50 border-t border-gray-100">
          {filtered.slice(0,60).map(d=>(
            <button key={d.id} onClick={()=>toggle(d.id)}
              className={`w-full text-left px-4 py-2.5 hover:bg-gray-50 flex items-center gap-3 ${sel.has(d.id)?"bg-teal-50":""}`}>
              <span className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 ${sel.has(d.id)?"bg-teal-600 border-teal-600 text-white":"border-gray-300"}`}>{sel.has(d.id)&&"✓"}</span>
              <div className="flex-1 min-w-0">
                <span className="text-sm font-semibold text-gray-700">{d.name}</span>
                <span className="text-xs text-gray-400 ml-2">{d.area} · {d.mdl||"—"}</span>
              </div>
            </button>
          ))}
          {filtered.length===0 && <p className="text-center py-6 text-gray-300 text-sm">No doctors found</p>}
        </div>
        <div className="flex gap-3 px-4 py-4 border-t border-gray-100">
          <button onClick={onClose} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
          <button onClick={()=>{onConfirm(Array.from(sel)); onClose();}} disabled={sel.size===0}
            className="flex-1 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-bold hover:bg-teal-700 disabled:opacity-40">
            Add {sel.size>0?`(${sel.size})`:""}
          </button>
        </div>
      </div>
    </div>
  );
}

const fmtShareDate = (mk, day) => {
  const [y,m] = mk.split("-").map(Number);
  const d = new Date(y, m-1, day);
  return d.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
};
const fmtNow = () => new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true});

  const planned = doctors.filter(function(d){ return tpEntryOf(toObj(monthDocs[d.id])[day]).planned; });
  const dateStr = fmtShareDate(month,day) + " · " + fmtNow();
  const compLine = companionFilter.length===0 ? "📍 Independent" : "👥 With: " + companionFilter.join(", ");
  const list = planned.map(function(d,i){ return (i+1)+". "+d.name+" | MDL "+(d.mdl||"—")+" | "+d.area; }).join("\n");
  return "🗓️ TOUR PLAN · "+dateStr+"\n"+compLine+"\n\n"+(list||"(no doctors planned)")+"\n\nTotal Planned: "+planned.length+"\nGenerated by Aldan Beat";
};

const buildTPShareMsgPerDoctor = (doctors, monthDocs, month, day) => {
  const planned = doctors.filter(function(d){ return tpEntryOf(toObj(monthDocs[d.id])[day]).planned; });
  const dateStr = fmtShareDate(month,day) + " · " + fmtNow();

  // Group doctors by companion signature
  const grouped = {};
  planned.forEach(function(d) {
    const entry = tpEntryOf(toObj(monthDocs[d.id])[day]);
    const key = entry.companions.length===0 ? "__independent__" : entry.companions.slice().sort().join("|");
    if (!grouped[key]) grouped[key] = {companions: entry.companions, docs: []};
    grouped[key].docs.push(d);
  });

  const keys = Object.keys(grouped);
  const allSame = keys.length === 1;

  let header = "🗓️ TOUR PLAN · " + dateStr + "\n";
  let body = "";
  let counter = 1;

  if (allSame) {
    // Single companion context — show once at top
    const grp = grouped[keys[0]];
    const compLine = grp.companions.length===0 ? "📍 Independent" : "👥 With: "+grp.companions.join(", ");
    header += compLine + "\n\n";
    body = grp.docs.map(function(d){ return (counter++)+". "+d.name+" | MDL "+(d.mdl||"—")+" | "+d.area; }).join("\n");
  } else {
    // Mixed — group by companion, show header per group
    header += "\n";
    const sections = [];
    keys.forEach(function(k) {
      const grp = grouped[k];
      const compLine = grp.companions.length===0 ? "📍 Independent ("+grp.docs.length+")" : "👥 With: "+grp.companions.join(", ")+" ("+grp.docs.length+")";
      const lines = grp.docs.map(function(d){ return (counter++)+". "+d.name+" | MDL "+(d.mdl||"—")+" | "+d.area; }).join("\n");
      sections.push(compLine + "\n" + lines);
    });
    body = sections.join("\n\n");
  }

  return header + (body||"(no doctors planned)") + "\n\nTotal Planned: "+planned.length+"\nGenerated by Aldan Beat";
};

const buildActualShareMsg = (doctors, monthPlan, monthActual, month, day) => {
  const dateStr = fmtShareDate(month,day) + " · " + fmtNow();
  const plannedIds = new Set(doctors.filter(function(d){ return tpEntryOf(toObj(monthPlan[d.id])[day]).planned; }).map(function(d){ return d.id; }));
  const allVisited = doctors.filter(function(d){ return !!visitOf(toObj(monthActual[d.id])[day]).done; });
  const plannedVisited = allVisited.filter(function(d){ return plannedIds.has(d.id); });
  const unplanned = allVisited.filter(function(d){ return !plannedIds.has(d.id); });

  // Determine companion context: check if all visited have the same companions
  const getCompKey = function(d) {
    const v = visitOf(toObj(monthActual[d.id])[day]);
    return v.companions.length===0 ? "__independent__" : v.companions.slice().sort().join("|");
  };
  const getCompLabel = function(d) {
    const v = visitOf(toObj(monthActual[d.id])[day]);
    return v.companions.length===0 ? null : v.companions.join(", ");
  };

  const allKeys = new Set(allVisited.map(getCompKey));
  const allSame = allKeys.size <= 1;

  let header = "✅ ACTUAL VISITS · " + dateStr + "\n";

  if (allSame && allVisited.length > 0) {
    const sampleComp = visitOf(toObj(monthActual[allVisited[0].id])[day]).companions;
    header += (sampleComp.length===0 ? "📍 Independent" : "👥 With: "+sampleComp.join(", ")) + "\n";
  }
  header += "\n";

  let msg = header;
  let counter = 1;

  const formatDoc = function(d) { return (counter++)+". "+d.name+" | MDL "+(d.mdl||"—")+" | "+d.area; };
  const formatDocWithComp = function(d) {
    const lbl = getCompLabel(d);
    return (counter++)+". "+d.name+" | MDL "+(d.mdl||"—")+" | "+d.area+(lbl?" | With: "+lbl:"");
  };

  if (plannedVisited.length) {
    msg += "PLANNED VISITS ("+plannedVisited.length+")\n";
    msg += plannedVisited.map(allSame ? formatDoc : formatDocWithComp).join("\n");
  }
  if (unplanned.length) {
    msg += (plannedVisited.length ? "\n\n" : "") + "UNPLANNED VISITS ("+unplanned.length+")\n";
    msg += unplanned.map(allSame ? formatDoc : formatDocWithComp).join("\n");
  }
  if (!plannedVisited.length && !unplanned.length) msg += "(no visits recorded)";

  msg += "\n\nTotal: "+allVisited.length+" | Planned: "+plannedVisited.length+" | Unplanned: "+unplanned.length;
  msg += "\nGenerated by Aldan Beat";
  return msg;
};

const shareToWA = (text) => {
  if (navigator.share) {
    navigator.share({title:"Aldan Beat", text}).catch(()=>{});
  } else {
    window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
  }
};

const BLANK_DOC = () => ({name:"",mdl:"",area:"",specialty:"",qualification:"",mobile:"",hospital:"",priority:"Medium",crmYN:"No",crmAmt:0});

function DoctorMasterTab({doctors, isAdmin, onSave, notify, ask}) {
  const [search, setSearch] = useState("");
  const [areaF, setAreaF]   = useState("All");
  const [modal, setModal]   = useState(false);
  const [form, setForm]     = useState(BLANK_DOC());
  const [editId, setEditId] = useState(null);

  const areas = useMemo(() => ["All", ...Array.from(new Set(doctors.map(d=>d.area).filter(Boolean)))], [doctors]);

  const filtered = doctors.filter(d =>
    (areaF==="All" || d.area===areaF) &&
    (d.name.toLowerCase().includes(search.toLowerCase()) || String(d.mdl||"").includes(search))
  );

  const openAdd  = () => { setForm(BLANK_DOC()); setEditId(null); setModal(true); };
  const openEdit = (d) => { setForm({...d}); setEditId(d.id); setModal(true); };

  const save = () => {
    if (!form.name.trim()) return;
    if (editId) {
      onSave(doctors.map(d => d.id===editId ? {...d, ...form, crmAmt:Number(form.crmAmt)||0} : d));

    } else {
      const maxId = doctors.length ? Math.max(...doctors.map(d=>d.id||0)) : 0;
      onSave([...doctors, {...form, id:maxId+1, crmAmt:Number(form.crmAmt)||0, isNew:true}]);
      notify("Doctor added!");
    }
    setModal(false);
  };

  const del = (d) => ask(`Remove "${d.name}" from master?`, () => {
    onSave(doctors.filter(x=>x.id!==d.id));
    notify("Removed","red");
  });

  return (
    <div>

      <p className="text-xs text-gray-400 mb-3">{filtered.length} of {doctors.length} doctors</p>

        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>{["#","Name","MDL","Area","Specialty","Priority","CRM","CRM Amt","Mobile",""].map(h=>(
                <th key={h} className="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-gray-400">{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {filtered.map((d,idx)=>(
                <tr key={d.id} className="hover:bg-gray-50">
                  <td className="px-3 py-2.5 text-xs text-gray-400">{idx+1}</td>
                  <td className="px-3 py-2.5 font-semibold text-gray-800">{d.name}</td>
                  <td className="px-3 py-2.5 text-xs text-gray-400">{d.mdl||"—"}</td>
                  <td className="px-3 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs bg-teal-50 text-teal-700">{d.area}</span></td>
                  <td className="px-3 py-2.5 text-xs text-gray-500">{d.specialty||"—"}</td>
                  <td className="px-3 py-2.5"><PriBadge p={d.priority}/></td>
                  <td className="px-3 py-2.5">{d.crmYN==="Yes" ? <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">Yes</span> : <span className="px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-500">No</span>}</td>
                  <td className="px-3 py-2.5 text-xs font-semibold text-gray-600">{d.crmYN==="Yes" ? fmt(d.crmAmt) : "—"}</td>
                  <td className="px-3 py-2.5 text-xs text-gray-500">{d.mobile||"—"}</td>

          <Fld label="MDL No"><input value={form.mdl} onChange={e=>setForm({...form,mdl:e.target.value})} className={INP}/></Fld>
          <Fld label="Area / HQ"><input value={form.area} onChange={e=>setForm({...form,area:e.target.value.toUpperCase()})} className={INP}/></Fld>
          <Fld label="Specialty"><input value={form.specialty} onChange={e=>setForm({...form,specialty:e.target.value})} className={INP}/></Fld>

          <Fld label="Hospital"><input value={form.hospital} onChange={e=>setForm({...form,hospital:e.target.value})} className={INP}/></Fld>
          <Fld label="Priority">

        </div>
        <div className="flex gap-3 pt-4 mt-4 border-t border-gray-100">
          <button onClick={()=>setModal(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
          <button onClick={save} disabled={!form.name.trim()} className="flex-1 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-bold hover:bg-teal-700 disabled:opacity-40">{editId?"Update":"Add Doctor"}</button>
        </div>
      </Modal>
    </div>
  );
}

function TourPlanTab({doctors, tourplan, month, setMonth, onToggle, onAddDoctorsToTP, onRemoveDoctorFromTP, onSetTPCompanions, availableCompanions}) {
  const areas = useMemo(() => Array.from(new Set(doctors.map(d=>d.area).filter(Boolean))), [doctors]);
  const [areaSel, setAreaSel] = useState("All");
  const [tpView, setTpView] = useState("daily"); // grid | daily
  const [date, setDate] = useState(function(){ return new Date().getDate(); });
  const [addOpen, setAddOpen] = useState(false);
  const [companionFilter, setCompanionFilter] = useState([]);

  const nDays = daysInMonth(month);
  const days = Array.from({length:nDays}, (_,i)=>i+1);
  const monthDocs = toObj(tourplan[month]);
  const rows = areaSel==="All" ? [] : doctors.filter(d => d.area===areaSel);

  const plannedCount = (docId) => Object.entries(toObj(monthDocs[docId])).filter(function([,v]){ return tpEntryOf(v).planned; }).length;
  const scopeDocs = areaSel==="All" ? doctors : rows;
  const totalCalls = scopeDocs.reduce((s,d)=>s+plannedCount(d.id), 0);
  const workDays = workingDaysInMonth(month);
  // Days with at least one planned doctor (in current area scope)
  const daysWithPlan = (function() {
    const daySet = new Set();
    scopeDocs.forEach(function(d) {
      Object.entries(toObj(monthDocs[d.id])).forEach(function(kv) {
        if (tpEntryOf(kv[1]).planned) daySet.add(kv[0]);
      });
    });
    return daySet.size;
  })();
  const callAvg = daysWithPlan ? (totalCalls / daysWithPlan).toFixed(1) : "0.0";

    <div>
