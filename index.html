                      <tr key={d.id} className="hover:bg-gray-50">
                        <td className="sticky left-0 bg-white px-3 py-1.5 font-semibold text-gray-700 whitespace-nowrap border-r border-gray-100 z-10" style={{width:DOC_COL_W,minWidth:DOC_COL_W}}>
                          {d.name}<span className="text-gray-300 font-normal"> · {d.mdl||"—"}</span>
                        </td>
                        <td className="sticky bg-white text-center font-bold text-teal-700 border-r border-gray-100 z-10" style={{left:DOC_COL_W,width:TOT_COL_W,minWidth:TOT_COL_W}}>{plannedCount(d.id)}</td>
                        {days.map(day=>{
                          const wd = weekdayOf(month,day);
                          const offDay = wd===0;
                          const checked = tpEntryOf(dMap[day]).planned;
                          return (
                            <td key={day} onClick={()=>onToggle(d.id, day)}
                              className={`text-center cursor-pointer select-none ${offDay?"bg-gray-50":""} ${checked?"bg-teal-100":""}`}>
                              {checked ? <span className="text-teal-600 font-bold">✓</span> : <span className="text-gray-200">·</span>}
                            </td>
                          );
                        })}
                        <td className="text-center">
                          <button onClick={()=>onRemoveDoctorFromTP(d.id)} className="text-red-300 hover:text-red-500 font-bold">✕</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {rows.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No doctors in this area · tap "+ Add Doctors"</div>}
          </div>
        </div>
      )}
    </div>
  );
}

function CompanionChips({companions, onChange, availableCompanions}) {
  const compList = availableCompanions || COMPANIONS;
  const isIndependent = !companions || companions.length===0;
  const toggleCompanion = (name) => {
    const set = new Set(companions||[]);
    if (set.has(name)) set.delete(name); else set.add(name);
    onChange(Array.from(set));
  };
  return (
    <div className="flex gap-1.5 flex-wrap">
      <button onClick={()=>onChange([])}
        className={`px-2 py-0.5 rounded-full text-[10px] font-bold border transition-colors ${isIndependent?"bg-gray-700 text-white border-gray-700":"bg-white text-gray-400 border-gray-200"}`}>
        Independent
      </button>
      {compList.map(c=>(
        <button key={c} onClick={()=>{ if(!isIndependent) toggleCompanion(c); }}
          className={`px-2 py-0.5 rounded-full text-[10px] font-bold border transition-colors ${(companions||[]).includes(c)?"bg-indigo-600 text-white border-indigo-600":"bg-white text-gray-400 border-gray-200"} ${isIndependent?"opacity-30 cursor-not-allowed":""}`}>
          {c}
        </button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════
   TAB: ACTUAL VISITS
══════════════════════════════════ */
function ActualVisitsTab({doctors, tourplan, actual, month, setMonth, onToggleActual, onSetCompanions, onClearPlan, mode, availableCompanions}) {
  const [view, setView] = useState("daily"); // daily | grid
  const nDays = daysInMonth(month);
  const [date, setDate] = useState(() => {
    const d = new Date();
    const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    return mk===month ? d.getDate() : 1;
  });
  const areas = useMemo(() => Array.from(new Set(doctors.map(d=>d.area).filter(Boolean))), [doctors]);
  const [areaSel, setAreaSel] = useState(areas[0] || "");
  useEffect(() => { if (!areas.includes(areaSel) && areas.length) setAreaSel(areas[0]); }, [areas.join(",")]);
  const [extraDocs, setExtraDocs] = useState([]);
  useEffect(() => { setExtraDocs([]); }, [areaSel, month]);

  const monthPlan   = toObj(tourplan[month]);
  const monthActual = toObj(actual[month]);

  // Month-level stats for banner (only days that have a plan)
  const avStats = useMemo(() => {
    const today = new Date();
    const [y,m] = month.split("-").map(Number);
    const nDaysM = daysInMonth(month);
    // Days with at least one planned doctor (within planned days only)
    const plannedDays = new Set();
    const visitedDays = new Set();
    let totalVisited = 0;
    for (let d=1; d<=nDaysM; d++) {
      const dayDate = new Date(y, m-1, d);
      if (dayDate > today) continue; // don't count future days
      const hasPlanned = doctors.some(doc => tpEntryOf(toObj(monthPlan[doc.id])[d]).planned);
      if (!hasPlanned) continue; // only count planned days
      plannedDays.add(d);
      const hasVisit = doctors.some(doc => visitOf(toObj(monthActual[doc.id])[d]).done);
      if (hasVisit) {
        visitedDays.add(d);
        doctors.forEach(doc => { if (visitOf(toObj(monthActual[doc.id])[d]).done) totalVisited++; });
      }
    }
    const daysWorked = visitedDays.size;
    const callAvg = daysWorked ? (totalVisited / daysWorked).toFixed(1) : "0.0";
    return {totalVisited, daysWorked, plannedDayCount: plannedDays.size, callAvg};
  }, [doctors, monthPlan, monthActual, month]);

  const [companionFilter, setCompanionFilter] = useState([]); // [] = no filter; values: "Independent" or a companion name

  const matchesFilter = (docId) => {
    if (companionFilter.length===0) return true;
    const v = visitOf(toObj(monthActual[docId])[date]);
    return companionFilter.some(f => f==="Independent" ? v.companions.length===0 : v.companions.includes(f));
  };

  /* ── Daily view: doctors planned for selected date ── */
  const plannedToday = doctors.filter(d => tpEntryOf(toObj(monthPlan[d.id])[date]).planned && matchesFilter(d.id));
  const visitedIds = new Set(Object.keys(monthActual).filter(id => !!visitOf(toObj(monthActual[id])[date]).done));
  const unplannedVisited = doctors.filter(d => visitedIds.has(String(d.id)) && !doctors.filter(x=>!!toObj(monthPlan[x.id])[date]).find(p=>p.id===d.id) && matchesFilter(d.id));

  const [addOpen, setAddOpen] = useState(false);
  const [gridAddOpen, setGridAddOpen] = useState(false);

  const handleActualShare = () => {
    const msg = buildActualShareMsg(doctors, monthPlan, monthActual, month, date);
    shareToWA(msg);
  };

  const dateStr = `${month}-${String(date).padStart(2,"0")}`;
  const minDate = `${month}-01`;
  const maxDate = `${month}-${String(nDays).padStart(2,"0")}`;

  const gridDocs = useMemo(() => {
    const base = doctors.filter(d=>d.area===areaSel);
    const extras = doctors.filter(d=>extraDocs.includes(d.id) && d.area!==areaSel);
    return [...base, ...extras];
  }, [doctors, areaSel, extraDocs]);

  return (
    <div>
      <div className="flex flex-wrap gap-2 mb-3">
        <button onClick={()=>setView("daily")} className={`px-4 py-2 rounded-lg text-sm font-bold ${view==="daily"?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>📋 Daily</button>
        <button onClick={()=>setView("grid")} className={`px-4 py-2 rounded-lg text-sm font-bold ${view==="grid"?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>🗓️ Monthly Grid</button>
        <MonthPicker value={month} onChange={setMonth}/>
      </div>

      <div className="grid grid-cols-3 gap-2 mb-4">
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm px-3 py-2.5">
          <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest">Total Visited</p>
          <p className="text-lg font-black text-emerald-600">{avStats.totalVisited}</p>
        </div>
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm px-3 py-2.5">
          <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest">Days Worked</p>
          <p className="text-lg font-black text-gray-700">{avStats.daysWorked}<span className="text-xs font-normal text-gray-400"> of {avStats.plannedDayCount}</span></p>
        </div>
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm px-3 py-2.5">
          <p className="text-[10px] font-bold uppercase text-gray-400 tracking-widest">Call Avg / Day</p>
          <p className="text-lg font-black text-indigo-700">{avStats.callAvg}</p>
        </div>
      </div>

      {view==="daily" && (
        <div>
          <div className="flex items-center gap-3 mb-3 flex-wrap">
            <input type="date" value={dateStr} min={minDate} max={maxDate}
              onChange={e=>{ const d = Number(e.target.value.split("-")[2]); if (d>=1 && d<=nDays) setDate(d); }}
              className="px-3 py-2 border border-gray-200 rounded-lg text-sm font-bold text-teal-700"/>
            <span className="text-xs text-gray-400">({WD[weekdayOf(month,date)]})</span>
            <button onClick={()=>setAddOpen(true)} className="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">+ Unplanned Visit</button>
            <button onClick={handleActualShare} className="ml-auto bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold">📤 Share</button>
          </div>

          <div className="flex gap-1.5 flex-wrap mb-4">
            <span className="text-[10px] font-bold uppercase text-gray-400 self-center mr-1">Filter:</span>
            {["Independent", ...(availableCompanions||COMPANIONS)].map(f=>(
              <button key={f} onClick={()=>setCompanionFilter(p=>p.includes(f)?p.filter(x=>x!==f):[...p,f])}
                className={`px-2.5 py-1 rounded-full text-[10px] font-bold border ${companionFilter.includes(f)?"bg-indigo-600 text-white border-indigo-600":"bg-white text-gray-400 border-gray-200"}`}>{f}</button>
            ))}
            {companionFilter.length>0 && <button onClick={()=>setCompanionFilter([])} className="text-[10px] text-gray-400 underline self-center">clear</button>}
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-4">
            <div className="px-4 py-2.5 bg-teal-50 border-b border-teal-100 text-xs font-bold text-teal-700 uppercase">Planned Today ({plannedToday.length})</div>
            {plannedToday.length===0 && <div className="text-center py-8 text-gray-300 text-sm">No doctors planned for this date</div>}
            <div className="divide-y divide-gray-50">
              {plannedToday.map(d=>{
                const v = visitOf(toObj(monthActual[d.id])[date]);
                return (
                  <div key={d.id} className="px-4 py-3">
                    <div className="flex items-center justify-between mb-2">
                      <div>
                        <p className="font-semibold text-gray-800 text-sm">{d.name}</p>
                        <p className="text-xs text-gray-400">{d.area} · MDL {d.mdl||"—"} {d.priority==="High" && <PriBadge p="High"/>}</p>
                      </div>
                      <button onClick={()=>onToggleActual(d.id, date)} className={`px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap ${v.done?"bg-emerald-100 text-emerald-700":"bg-gray-100 text-gray-500"}`}>
                        {v.done?"✓ Visited":"Mark Visited"}
                      </button>
                    </div>
                    <CompanionChips companions={v.companions} onChange={(c)=>onSetCompanions(d.id, date, c)} availableCompanions={availableCompanions||COMPANIONS}/>
                  </div>
                );
              })}
            </div>
          </div>

          {unplannedVisited.length>0 && (
            <div className="bg-white rounded-2xl border border-amber-100 shadow-sm overflow-hidden">
              <div className="px-4 py-2.5 bg-amber-50 border-b border-amber-100 text-xs font-bold text-amber-700 uppercase">Unplanned Visits ({unplannedVisited.length})</div>
              <div className="divide-y divide-gray-50">
                {unplannedVisited.map(d=>{
                  const v = visitOf(toObj(monthActual[d.id])[date]);
                  return (
                    <div key={d.id} className="px-4 py-3">
                      <div className="flex items-center justify-between mb-2">
                        <div>
                          <p className="font-semibold text-gray-800 text-sm">{d.name}</p>
                          <p className="text-xs text-gray-400">{d.area} · MDL {d.mdl||"—"}</p>
                        </div>
                        <button onClick={()=>onToggleActual(d.id, date)} className="px-3 py-1.5 rounded-lg text-xs font-bold bg-emerald-100 text-emerald-700">✓ Visited</button>
                      </div>
                      <CompanionChips companions={v.companions} onChange={(c)=>onSetCompanions(d.id, date, c)} availableCompanions={availableCompanions||COMPANIONS}/>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {addOpen && <MultiSelectPicker doctors={doctors} title="➕ Log Unplanned Visits"
            onConfirm={(ids)=>{ ids.forEach(id=>onToggleActual(id,date,true)); }}
            onClose={()=>setAddOpen(false)}/>}
        </div>
      )}

      {view==="grid" && (
        <div>
          <div className="flex gap-1.5 flex-wrap mb-3">
            {areas.map(a=>(
              <button key={a} onClick={()=>setAreaSel(a)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${areaSel===a?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>{a}</button>
            ))}
            <button onClick={()=>setGridAddOpen(true)} className="px-3 py-1.5 rounded-lg text-xs font-bold bg-amber-500 text-white">+ Add Doctor</button>
          </div>
          <div className="flex gap-4 text-xs mb-3 text-gray-500 flex-wrap">
            <span><span className="inline-block w-3 h-3 bg-blue-100 border border-blue-300 align-middle mr-1"></span>Planned only</span>
            <span><span className="inline-block w-3 h-3 bg-emerald-200 border border-emerald-400 align-middle mr-1"></span>Visited</span>
            <span><span className="inline-block w-3 h-3 bg-amber-200 border border-amber-400 align-middle mr-1"></span>Unplanned visit</span>
          </div>
          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="text-xs border-collapse">
                <thead>
                  <tr className="bg-gray-50 border-b border-gray-100">
                    <th className="sticky left-0 bg-gray-50 px-3 py-2 text-left font-bold text-gray-400 uppercase whitespace-nowrap z-10 border-r border-gray-100">Doctor</th>
                    {Array.from({length:nDays},(_,i)=>i+1).map(d=>(
                      <th key={d} className="px-1.5 py-1 text-center font-bold text-gray-400" style={{minWidth:"24px"}}>{d}</th>
                    ))}
                    <th className="px-2 py-2 text-center font-bold text-gray-400">Plan</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-50">
                  {gridDocs.map(d=>{
                    const pMap = toObj(monthPlan[d.id]);
                    const aMap = toObj(monthActual[d.id]);
                    const hasPlan = Object.values(pMap).some(Boolean);
                    return (
                      <tr key={d.id} className="hover:bg-gray-50">
                        <td className="sticky left-0 bg-white px-3 py-1.5 font-semibold text-gray-700 whitespace-nowrap border-r border-gray-100">
                          {d.name}{extraDocs.includes(d.id) && <span className="text-amber-500 font-normal"> · {d.area}</span>}
                        </td>
                        {Array.from({length:nDays},(_,i)=>i+1).map(day=>{
                          const planned = tpEntryOf(pMap[day]).planned, done = visitOf(aMap[day]).done;
                          let cls = "text-gray-200";
                          if (planned && done) cls = "bg-emerald-200 text-emerald-800 font-bold";
                          else if (planned) cls = "bg-blue-100 text-blue-600";
                          else if (done) cls = "bg-amber-200 text-amber-800 font-bold";
                          return <td key={day} onClick={()=>onToggleActual(d.id, day)} className={`text-center cursor-pointer select-none ${cls}`}>{planned||done?"✓":"·"}</td>;
                        })}
                        <td className="text-center">
                          {hasPlan
                            ? <button onClick={()=>onClearPlan(d.id)} title="Remove this doctor's plan for the month" className="text-red-400 hover:text-red-600 font-bold">✕</button>
                            : <span className="text-gray-200">—</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {gridDocs.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No doctors in this area</div>}
          </div>

          {gridAddOpen && <MultiSelectPicker doctors={doctors} title="➕ Add Doctors to Grid"
            onConfirm={(ids)=>{ setExtraDocs(p=>[...new Set([...p,...ids])]); }}
            onClose={()=>setGridAddOpen(false)}/>}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════
   TAB: BUSINESS PLAN (doctor-wise, month-wise)
══════════════════════════════════ */
function BusinessPlanTab({doctors, bizplan, bizFieldDefs, month, setMonth, onSaveEntry, onAddField, isAdmin, notify}) {
  const areas = useMemo(() => Array.from(new Set(doctors.map(d=>d.area).filter(Boolean))), [doctors]);
  const [areaSel, setAreaSel] = useState("All");
  const [search, setSearch]   = useState("");
  const [modal, setModal]     = useState(null);
  const [form, setForm]       = useState({});
  const [fieldModal, setFieldModal] = useState(false);
  const [newField, setNewField] = useState({label:"", type:"text"});
  const [bizView, setBizView] = useState("list"); // list | area
  const [areaSubSel, setAreaSubSel] = useState("All");
  const [quickAmt, setQuickAmt] = useState({}); // {docId: amount string}
  const [qaModal, setQaModal] = useState(false); // quick-add modal
  const [qaEdits, setQaEdits] = useState({}); // {docId: {tentativeBiz, focusProduct}}
  const [qaSearch, setQaSearch] = useState("");
  const [qaArea, setQaArea] = useState("All");

  const monthData = toObj(bizplan[month]);
  const numFields = bizFieldDefs.filter(f=>f.type==="number");
  const totals = {};
  numFields.forEach(f => { totals[f.key] = doctors.reduce((s,d)=>s+Number(toObj(monthData[d.id])[f.key]||0),0); });
  const plannedCount = doctors.filter(d=>Object.keys(toObj(monthData[d.id])).length>0).length;

  const filtered = doctors.filter(d =>
    (areaSel==="All" || d.area===areaSel) &&
    d.name.toLowerCase().includes(search.toLowerCase())
  );

  // Quick-add modal filtered list — respects qaArea + qaSearch
  const qaFiltered = doctors.filter(d =>
    (qaArea==="All" || d.area===qaArea) &&
    d.name.toLowerCase().includes(qaSearch.toLowerCase())
  );

  const openQuickAdd = () => {
    // Pre-fill qaEdits with existing biz data for all doctors
    const init = {};
    doctors.forEach(d => {
      const e = toObj(monthData[d.id]);
      if (e.tentativeBiz || (e.focusProduct && e.focusProduct.length)) {
        const fp = e.focusProduct;
        init[d.id] = {
          tentativeBiz: e.tentativeBiz||"",
          focusProduct: Array.isArray(fp)?fp:(fp?[fp]:[]),
        };
      }
    });
    setQaEdits(init);
    setQaSearch("");
    setQaArea(areaSel); // inherit current area filter
    setQaModal(true);
  };

  const setQaField = (docId, field, val) => {
    setQaEdits(p => ({...p, [docId]: {...(p[docId]||{}), [field]: val}}));
  };

  const saveQaOne = (docId) => {
    const d = doctors.find(x=>x.id===docId);
    const qa = qaEdits[docId]||{};
    if (!qa.tentativeBiz && !(qa.focusProduct||[]).length) return;
    const entry = toObj(monthData[docId]);
    onSaveEntry(docId, {...entry, tentativeBiz: String(qa.tentativeBiz||0), focusProduct: qa.focusProduct||[], priority: entry.priority||d.priority||"Medium", crmYN: entry.crmYN||d.crmYN||"No", crmAmt: entry.crmAmt||d.crmAmt||0, tentativeCrmMonth: entry.tentativeCrmMonth||month});
    notify("Saved!");
  };

  const saveQaAll = () => {
    const ids = Object.keys(qaEdits).filter(id => {
      const qa = qaEdits[id];
      return qa && (qa.tentativeBiz || (qa.focusProduct||[]).length);
    });
    if (!ids.length) { notify("Nothing to save","red"); return; }
    ids.forEach(id => saveQaOne(Number(id)));
    notify(ids.length+" doctors updated!");
    setQaModal(false);
  };

  const toggleQaProduct = (docId, p) => {
    const cur = (qaEdits[docId]||{}).focusProduct||[];
    const next = cur.includes(p) ? cur.filter(x=>x!==p) : [...cur,p];
    setQaField(docId, "focusProduct", next);
  };

  const openEdit = (d) => {
    const entry = toObj(monthData[d.id]);
    setForm({...entry, priority: entry.priority || d.priority || "Medium", crmYN: entry.crmYN || d.crmYN || "No", crmAmt: entry.crmAmt!==undefined ? entry.crmAmt : d.crmAmt, tentativeCrmMonth: entry.tentativeCrmMonth || month});
    setModal(d.id);
  };

  const save = () => { onSaveEntry(modal, form); notify("Business plan updated!"); setModal(null); };

  const saveQuick = (docId) => {
    const amt = Number(quickAmt[docId]||0);
    if (!amt) return;
    const entry = toObj(monthData[docId]);
    const d = doctors.find(x=>x.id===docId);
    onSaveEntry(docId, {...entry, tentativeBiz: String(amt), priority: entry.priority||d.priority||"Medium", crmYN: entry.crmYN||d.crmYN||"No", crmAmt: entry.crmAmt||d.crmAmt||0, tentativeCrmMonth: entry.tentativeCrmMonth||month});
    notify("Saved!");
    setQuickAmt(p=>({...p,[docId]:""}));
  };

  const addField = () => {
    if (!newField.label.trim()) return;
    const key = "f_" + newField.label.trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").slice(0,24) + "_" + uid().slice(0,4);
    onAddField({key, label:newField.label.trim(), type:newField.type});
    setNewField({label:"",type:"text"}); setFieldModal(false);
  };

  const editingDoc = modal ? doctors.find(d=>d.id===modal) : null;

  return (
    <div>
      <div className="flex flex-col gap-2 mb-3">
        <div className="flex items-center gap-2 flex-wrap">
          <MonthPicker value={month} onChange={setMonth}/>
          <div className="flex gap-1 bg-gray-100 p-0.5 rounded-lg">
            <button onClick={()=>setBizView("list")} className={`px-3 py-1.5 rounded-md text-xs font-bold ${bizView==="list"?"bg-white text-teal-700 shadow-sm":"text-gray-500"}`}>📋 List</button>
            <button onClick={()=>setBizView("area")} className={`px-3 py-1.5 rounded-md text-xs font-bold ${bizView==="area"?"bg-white text-teal-700 shadow-sm":"text-gray-500"}`}>🏘️ Area</button>
          </div>
          {isAdmin && bizView==="list" && <button onClick={()=>setFieldModal(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap">+ Add Field</button>}
          {bizView==="list" && <button onClick={openQuickAdd} className="bg-teal-600 hover:bg-teal-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap">⚡ Quick Add</button>}
        </div>
        {bizView==="list" && (
          <div className="flex gap-2 flex-wrap">
            <select value={areaSel} onChange={e=>setAreaSel(e.target.value)} className={INP + " max-w-44"}>
              <option>All</option>{areas.map(a=><option key={a}>{a}</option>)}
            </select>
            <input placeholder="Search doctor…" value={search} onChange={e=>setSearch(e.target.value)} className={INP}/>
          </div>
        )}
        {bizView==="area" && (
          <div className="flex gap-1.5 flex-wrap">
            <button onClick={()=>setAreaSubSel("All")} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${areaSubSel==="All"?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>All</button>
            {areas.map(a=><button key={a} onClick={()=>setAreaSubSel(a)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${areaSubSel===a?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>{a}</button>)}
          </div>
        )}
      </div>

      <div className="bg-teal-50 border border-teal-100 rounded-xl px-4 py-3 mb-4 flex flex-wrap gap-x-6 gap-y-1.5 text-xs">
        <span className="text-teal-700 font-bold">{plannedCount} of {doctors.length} doctors planned</span>
        {numFields.map(f=>(
          <span key={f.key} className="text-gray-600">{f.label}: <strong className="text-teal-700">{fmt(totals[f.key])}</strong></span>
        ))}
        {numFields.length===0 && <span className="text-gray-400">Add a number field to track totals</span>}
      </div>

      {/* ── AREA QUICK-ADD VIEW ── */}
      {bizView==="area" && (
        <div>
          {(areaSubSel==="All"?areas:[areaSubSel]).map(area=>(
            <div key={area} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-4">
              <div className="px-4 py-2.5 bg-teal-50 border-b border-teal-100 text-xs font-bold text-teal-700 uppercase">{area} · {doctors.filter(d=>d.area===area).length} doctors</div>
              <div className="divide-y divide-gray-50">
                {doctors.filter(d=>d.area===area).map(d=>{
                  const entry = toObj(monthData[d.id]);
                  const hasPlan = Object.keys(entry).some(k=>entry[k]!==undefined&&entry[k]!=="");
                  const biz = entry.tentativeBiz||"";
                  return (
                    <div key={d.id} className="px-4 py-3">
                      <div className="flex items-center justify-between mb-1.5">
                        <div>
                          <p className="font-semibold text-gray-800 text-sm">{d.name} <span className="text-gray-300 font-normal text-xs">· {d.mdl||"—"}</span></p>
                          {hasPlan && <p className="text-xs text-teal-600 font-bold">Tentative: {fmt(biz||0)} {entry.focusProduct && (Array.isArray(entry.focusProduct)?entry.focusProduct:entry.focusProduct.split(",")).length>0?`· ${(Array.isArray(entry.focusProduct)?entry.focusProduct:[entry.focusProduct]).join(", ")}`:"" }</p>}
                        </div>
                        <button onClick={()=>openEdit(d)} className="text-teal-400 hover:text-teal-700 text-xs font-bold px-2">✏️</button>
                      </div>
                      <div className="flex gap-2">
                        <input type="number" placeholder="Tentative Business (Rs.)" value={quickAmt[d.id]||""} onChange={e=>setQuickAmt(p=>({...p,[d.id]:e.target.value}))}
                          className="flex-1 px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-teal-300"/>
                        <button onClick={()=>saveQuick(d.id)} disabled={!quickAmt[d.id]} className="px-3 py-1.5 bg-teal-600 text-white rounded-lg text-xs font-bold disabled:opacity-40 hover:bg-teal-700">Save</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── LIST VIEW ── */}
      {bizView==="list" && (
      <div>
      <p className="text-xs text-gray-400 mb-3">{monthLabel(month)} · {filtered.length} doctors · tap a row to plan</p>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>
                {["Doctor","Area","Priority","CRM","Mobile",...bizFieldDefs.map(f=>f.label),""].map((h,i)=>(
                  <th key={i} className="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-gray-400 whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {filtered.map(d=>{
                const entry = toObj(monthData[d.id]);
                return (
                  <tr key={d.id} className="hover:bg-gray-50 cursor-pointer" onClick={()=>openEdit(d)}>
                    <td className="px-3 py-2.5 font-semibold text-gray-800 whitespace-nowrap">{d.name}</td>
                    <td className="px-3 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs bg-teal-50 text-teal-700">{d.area}</span></td>
                    <td className="px-3 py-2.5"><PriBadge p={d.priority}/></td>
                    <td className="px-3 py-2.5 text-xs">{d.crmYN==="Yes"?<span className="text-emerald-600 font-bold">Yes</span>:<span className="text-gray-400">No</span>}</td>
                    <td className="px-3 py-2.5 text-xs text-gray-500">{d.mobile||"—"}</td>
                    {bizFieldDefs.map(f=>(
                      <td key={f.key} className="px-3 py-2.5 text-xs text-gray-600 whitespace-nowrap">{entry[f.key]!==undefined && entry[f.key]!=="" && !(Array.isArray(entry[f.key]) && entry[f.key].length===0) ? (f.type==="multiselect"?(Array.isArray(entry[f.key])?entry[f.key].join(", "):String(entry[f.key])):(f.type==="number"?fmt(entry[f.key]):String(entry[f.key]))) : "—"}</td>
                    ))}
                    <td className="px-3 py-2.5 text-teal-500 text-xs font-bold">Edit</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No doctors found</div>}
      </div>
      </div>
      )}{/* end bizView==="list" */}

      <Modal open={!!modal} onClose={()=>setModal(null)} title={editingDoc ? `📋 ${editingDoc.name}` : "Business Plan"} wide>
        {editingDoc && (
          <div>
            <div className="bg-gray-50 rounded-xl p-3 mb-4 text-xs text-gray-500 grid grid-cols-2 gap-y-1">
              <span>MDL: <strong className="text-gray-700">{editingDoc.mdl||"—"}</strong></span>
              <span>Area: <strong className="text-gray-700">{editingDoc.area}</strong></span>
              <span>Specialty: <strong className="text-gray-700">{editingDoc.specialty||"—"}</strong></span>
              <span>Mobile: <strong className="text-gray-700">{editingDoc.mobile||"—"}</strong></span>
            </div>
            <div className="grid grid-cols-2 gap-4 mb-4">
              <Fld label="Priority">
                <select value={form.priority||"Medium"} onChange={e=>setForm({...form,priority:e.target.value})} className={INP}>
                  {PRIORITIES.map(p=><option key={p}>{p}</option>)}
                </select>
              </Fld>
              <Fld label="CRM">
                <select value={form.crmYN||"No"} onChange={e=>setForm({...form,crmYN:e.target.value})} className={INP}>
                  <option>No</option><option>Yes</option>
                </select>
              </Fld>
              {form.crmYN==="Yes" && <Fld label="Tentative CRM Month"><MonthPicker value={form.tentativeCrmMonth||month} onChange={v=>setForm({...form,tentativeCrmMonth:v})}/></Fld>}
              {form.crmYN==="Yes" && <Fld label="CRM Amt (Rs.)"><input type="number" value={form.crmAmt||""} onChange={e=>setForm({...form,crmAmt:e.target.value})} className={INP}/></Fld>}
            </div>
            <div className="grid grid-cols-2 gap-4">
              {bizFieldDefs.map(f=>(
                <Fld key={f.key} label={f.label}>
                  {f.key==="focusProduct"
                    ? <div className="col-span-2">
                        <div className="flex flex-wrap gap-1.5 p-2 border border-gray-200 rounded-lg min-h-10">
                          {ALDERMA_PRODUCTS.map(p=>{
                            const sel = Array.isArray(form[f.key]) ? form[f.key] : (form[f.key]?[form[f.key]]:[]);
                            const active = sel.includes(p);
                            return <button key={p} type="button" onClick={()=>{
                              const cur = Array.isArray(form[f.key]) ? form[f.key] : (form[f.key]?[form[f.key]]:[]);
                              const next = active ? cur.filter(x=>x!==p) : [...cur,p];
                              setForm({...form,[f.key]:next});
                            }} className={`px-2 py-0.5 rounded-full text-[10px] font-bold border transition-colors ${active?"bg-teal-600 text-white border-teal-600":"bg-white text-gray-400 border-gray-200 hover:border-teal-300"}`}>{p}</button>;
                          })}
                        </div>
                        {(()=>{const s=Array.isArray(form[f.key])?form[f.key]:(form[f.key]?[form[f.key]]:[]);return s.length>0&&<p className="text-[10px] text-teal-600 mt-1 font-semibold">{s.length} selected: {s.join(", ")}</p>;})()}
                      </div>
                    : f.type==="number"
                    ? <input type="number" value={form[f.key]||""} onChange={e=>setForm({...form,[f.key]:e.target.value})} className={INP}/>
                    : <input value={form[f.key]||""} onChange={e=>setForm({...form,[f.key]:e.target.value})} className={INP}/>}
                </Fld>
              ))}
            </div>
            <div className="flex gap-3 pt-4 mt-4 border-t border-gray-100">
              <button onClick={()=>setModal(null)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
              <button onClick={save} className="flex-1 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-bold hover:bg-teal-700">Save Plan</button>
            </div>
          </div>
        )}
      </Modal>

      <Modal open={fieldModal} onClose={()=>setFieldModal(false)} title="➕ Add Custom Field">
        <div className="space-y-4">
          <Fld label="Field Name"><input value={newField.label} onChange={e=>setNewField({...newField,label:e.target.value})} placeholder="e.g. Target Rx / Month" className={INP} autoFocus/></Fld>
          <Fld label="Type">
            <select value={newField.type} onChange={e=>setNewField({...newField,type:e.target.value})} className={INP}>
              <option value="text">Text</option><option value="number">Number</option>
            </select>
          </Fld>
          <div className="flex gap-3 pt-2">
            <button onClick={()=>setFieldModal(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
            <button onClick={addField} disabled={!newField.label.trim()} className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 disabled:opacity-40">Add Field</button>
          </div>
        </div>
      </Modal>

      {/* ── Quick Add Modal ── */}
      {qaModal && (
        <div className="fixed inset-0 z-50 flex flex-col" style={{background:"rgba(15,23,42,0.65)"}}>
          <div className="bg-white flex flex-col" style={{marginTop:"auto",maxHeight:"92%",borderRadius:"20px 20px 0 0"}}>
            {/* Header */}
            <div className="flex justify-between items-center px-5 pt-5 pb-3 border-b border-gray-100 flex-shrink-0">
              <h2 className="text-base font-bold text-gray-800">⚡ Quick Add Business Plan</h2>
              <button onClick={()=>setQaModal(false)} className="text-gray-300 hover:text-gray-700 text-xl font-bold">✕</button>
            </div>
            {/* Filters */}
            <div className="px-4 pt-3 pb-2 flex-shrink-0 space-y-2 border-b border-gray-100">
              <input placeholder="Search doctor…" value={qaSearch} onChange={e=>setQaSearch(e.target.value)} className={INP} autoFocus/>
              <div className="flex gap-1.5 flex-wrap">
                <button onClick={()=>setQaArea("All")} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border ${qaArea==="All"?"bg-teal-600 text-white border-teal-600":"bg-white text-gray-400 border-gray-200"}`}>All</button>
                {areas.map(a=><button key={a} onClick={()=>setQaArea(a)} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border ${qaArea===a?"bg-teal-600 text-white border-teal-600":"bg-white text-gray-400 border-gray-200"}`}>{a}</button>)}
              </div>
              <p className="text-xs text-gray-400">{Object.keys(qaEdits).filter(id=>qaEdits[id]&&(qaEdits[id].tentativeBiz||(qaEdits[id].focusProduct||[]).length)).length} doctors edited</p>
            </div>
            {/* Doctor list */}
            <div className="overflow-y-auto flex-1">
              {qaFiltered.map(d=>{
                const qa = qaEdits[d.id]||{};
                const existing = toObj(monthData[d.id]);
                const curBiz = qa.tentativeBiz!==undefined ? qa.tentativeBiz : (existing.tentativeBiz||"");
                const curProd = qa.focusProduct!==undefined ? qa.focusProduct : (Array.isArray(existing.focusProduct)?existing.focusProduct:(existing.focusProduct?[existing.focusProduct]:[]));
                const isDirty = (qa.tentativeBiz!==undefined && qa.tentativeBiz!==existing.tentativeBiz) || (qa.focusProduct!==undefined);
                return (
                  <div key={d.id} className={`px-4 py-3 border-b border-gray-50 ${isDirty?"bg-teal-50/40":""}`}>
                    <div className="flex items-center justify-between mb-2">
                      <div>
                        <p className="font-semibold text-gray-800 text-sm">{d.name} <span className="text-gray-300 text-xs font-normal">· {d.mdl||"—"}</span></p>
                        <p className="text-xs text-gray-400">{d.area}</p>
                      </div>
                      <button onClick={()=>saveQaOne(d.id)} disabled={!curBiz && !curProd.length}
                        className="px-3 py-1.5 bg-teal-600 text-white rounded-lg text-xs font-bold disabled:opacity-30 hover:bg-teal-700 flex-shrink-0 ml-2">Save</button>
                    </div>
                    <div className="flex gap-2 mb-2">
                      <input type="number" placeholder="Tentative Business (Rs.)" value={curBiz}
                        onChange={e=>setQaField(d.id,"tentativeBiz",e.target.value)}
                        className="flex-1 px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-teal-300"/>
                    </div>
                    <div className="flex flex-wrap gap-1">
                      {ALDERMA_PRODUCTS.map(p=>(
                        <button key={p} onClick={()=>toggleQaProduct(d.id,p)}
                          className={`px-2 py-0.5 rounded-full text-[9px] font-bold border transition-colors ${curProd.includes(p)?"bg-teal-600 text-white border-teal-600":"bg-white text-gray-400 border-gray-200"}`}>{p}</button>
                      ))}
                    </div>
                  </div>
                );
              })}
              {qaFiltered.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No doctors found</div>}
            </div>
            {/* Footer */}
            <div className="px-4 py-3 border-t border-gray-100 flex gap-3 flex-shrink-0">
              <button onClick={()=>setQaModal(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
              <button onClick={saveQaAll} className="flex-1 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-bold hover:bg-teal-700">💾 Save All</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════
   TAB: CRM PLAN (month-wise)
══════════════════════════════════ */
const BLANK_CRM = () => ({doctorId:"",doctorName:"",mdl:"",area:"",crmPlanDate:today(),actualMonth:"",crmAmt:"",tentativeBizPM:"",priority:"Medium"});

function CrmPlanTab({doctors, crmplan, month, setMonth, onSave, onSavePriority, notify, ask}) {
  const list = toArr(crmplan[month]);
  const [modal, setModal] = useState(false);
  const [form, setForm]   = useState(BLANK_CRM());
  const [editId, setEditId] = useState(null);
  const [docSearch, setDocSearch] = useState("");
  const areas = useMemo(() => Array.from(new Set(doctors.map(d=>d.area).filter(Boolean))), [doctors]);
  const [areaSel, setAreaSel] = useState("All");

  const openAdd  = (presetDoc) => {
    if (presetDoc) setForm({...BLANK_CRM(), doctorId:presetDoc.id, doctorName:presetDoc.name, mdl:presetDoc.mdl||"", area:presetDoc.area||"", priority:presetDoc.priority||"Medium"});
    else setForm(BLANK_CRM());
    setEditId(null); setModal(true);
  };
  const openEdit = (e) => { setForm({...BLANK_CRM(), ...e}); setEditId(e.id); setModal(true); };

  const pickDoctor = (d) => {
    setForm({...form, doctorId:d.id, doctorName:d.name, mdl:d.mdl||"", area:d.area||"", priority:d.priority||"Medium"});
    setDocSearch("");
  };

  const save = () => {
    if (!form.doctorName.trim() || !form.crmAmt) return;
    const entry = {...form, crmAmt:Number(form.crmAmt)||0, tentativeBizPM:Number(form.tentativeBizPM)||0, id:editId||uid()};
    if (editId) onSave(list.map(x=>x.id===editId?entry:x));
    else onSave([...list, entry]);
    if (form.doctorId && form.priority) onSavePriority(form.doctorId, form.priority);
    notify(editId?"Updated!":"CRM plan added!");
    setModal(false);
  };

  const del = (e) => ask(`Delete CRM plan for "${e.doctorName}"?`, () => {
    onSave(list.filter(x=>x.id!==e.id));
    notify("Deleted","red");
  });

  const totalCrm = list.reduce((s,e)=>s+Number(e.crmAmt||0),0);
  const totalBiz = list.reduce((s,e)=>s+Number(e.tentativeBizPM||0),0);
  const entryForDoc = (docId) => list.find(e=>e.doctorId===docId);

  return (
    <div>
      <div className="flex flex-col md:flex-row md:items-center gap-3 mb-3">
        <MonthPicker value={month} onChange={setMonth}/>
        <button onClick={()=>openAdd()} className="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap">+ Add CRM Plan</button>
        <div className="md:ml-auto flex gap-4 text-xs">
          <span className="text-gray-500">CRM Total: <strong className="text-teal-700">{fmt(totalCrm)}</strong></span>
          <span className="text-gray-500">Tentative Business: <strong className="text-indigo-700">{fmt(totalBiz)}</strong></span>
        </div>
      </div>

      <div className="flex gap-1.5 flex-wrap mb-4">
        <button onClick={()=>setAreaSel("All")} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${areaSel==="All"?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500 hover:bg-gray-50"}`}>All</button>
        {areas.map(a=>(
          <button key={a} onClick={()=>setAreaSel(a)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${areaSel===a?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500 hover:bg-gray-50"}`}>{a}</button>
        ))}
      </div>

      {areaSel==="All" ? (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>{["Doctor","MDL","Area","Plan Date","Actual Month","CRM Amt","Tentative Biz p.m.","",""].map(h=>(
                  <th key={h} className="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-gray-400 whitespace-nowrap">{h}</th>
                ))}</tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {list.map(e=>(
                  <tr key={e.id} className="hover:bg-gray-50">
                    <td className="px-3 py-2.5 font-semibold text-gray-800 whitespace-nowrap">{e.doctorName}</td>
                    <td className="px-3 py-2.5 text-xs text-gray-400">{e.mdl||"—"}</td>
                    <td className="px-3 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs bg-teal-50 text-teal-700">{e.area}</span></td>
                    <td className="px-3 py-2.5 text-xs text-gray-500">{e.crmPlanDate||"—"}</td>
                    <td className="px-3 py-2.5 text-xs text-gray-500">{e.actualMonth?monthLabel(e.actualMonth):"—"}</td>
                    <td className="px-3 py-2.5 font-bold text-teal-700">{fmt(e.crmAmt)}</td>
                    <td className="px-3 py-2.5 font-bold text-indigo-700">{fmt(e.tentativeBizPM)}</td>
                    <td className="px-3 py-2.5"><button onClick={()=>openEdit(e)} className="text-teal-400 hover:text-teal-700">✏️</button></td>
                    <td className="px-3 py-2.5"><button onClick={()=>del(e)} className="text-gray-200 hover:text-red-500">🗑️</button></td>
                  </tr>
                ))}
              </tbody>
              {list.length>0 && (
                <tfoot>
                  <tr className="bg-teal-50 border-t-2 border-teal-200 font-black text-sm">
                    <td className="px-3 py-3 text-teal-800" colSpan={5}>Total</td>
                    <td className="px-3 py-3 text-teal-700">{fmt(totalCrm)}</td>
                    <td className="px-3 py-3 text-indigo-700">{fmt(totalBiz)}</td>
                    <td colSpan={2}></td>
                  </tr>
                </tfoot>
              )}
            </table>
          </div>
          {list.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No CRM plans for {monthLabel(month)} yet</div>}
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="px-4 py-2.5 bg-teal-50 border-b border-teal-100 text-xs font-bold text-teal-700 uppercase">{areaSel} · {doctors.filter(d=>d.area===areaSel).length} doctors</div>
          <div className="divide-y divide-gray-50">
            {doctors.filter(d=>d.area===areaSel).map(d=>{
              const e = entryForDoc(d.id);
              return (
                <div key={d.id} className="flex items-center justify-between px-4 py-3">
                  <div>
                    <p className="font-semibold text-gray-800 text-sm">{d.name} <span className="text-gray-300 font-normal text-xs">· {d.mdl||"—"}</span></p>
                    {e
                      ? <p className="text-xs text-gray-400">Plan: {e.crmPlanDate||"—"} · Actual: {e.actualMonth?monthLabel(e.actualMonth):"—"} · <strong className="text-teal-700">{fmt(e.crmAmt)}</strong></p>
                      : <p className="text-xs text-gray-300">No CRM plan for {monthLabel(month)}</p>}
                  </div>
                  {e
                    ? <button onClick={()=>openEdit(e)} className="px-3 py-1.5 rounded-lg text-xs font-bold bg-teal-50 text-teal-700">✏️ Edit</button>
                    : <button onClick={()=>openAdd(d)} className="px-3 py-1.5 rounded-lg text-xs font-bold bg-amber-500 text-white">+ Add</button>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <Modal open={modal} onClose={()=>setModal(false)} title={editId?"✏️ Edit CRM Plan":"➕ Add CRM Plan"}>
        <div className="space-y-4">
          <Fld label="Doctor *">
            {form.doctorName && <div className="flex items-center justify-between bg-teal-50 rounded-lg px-3 py-2 mb-2">
              <span className="text-sm font-semibold text-teal-800">{form.doctorName} <span className="text-teal-400 font-normal">· {form.area}</span></span>
              <button onClick={()=>setForm({...form,doctorId:"",doctorName:"",mdl:"",area:""})} className="text-teal-400 hover:text-teal-700 text-xs">change</button>
            </div>}
            {!form.doctorName && <div>
              <input placeholder="Search doctor…" value={docSearch} onChange={e=>setDocSearch(e.target.value)} className={INP} autoFocus/>
              {docSearch && (
                <div className="max-h-40 overflow-y-auto border border-gray-100 rounded-xl mt-1.5 divide-y divide-gray-50">
                  {doctors.filter(d=>d.name.toLowerCase().includes(docSearch.toLowerCase())).slice(0,20).map(d=>(
                    <button key={d.id} onClick={()=>pickDoctor(d)} className="w-full text-left px-3 py-2 hover:bg-gray-50 text-sm flex justify-between">
                      <span className="font-semibold text-gray-700">{d.name}</span><span className="text-xs text-gray-400">{d.area}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>}
          </Fld>
          <div className="grid grid-cols-2 gap-3">
            <Fld label="CRM Plan Date"><input type="date" value={form.crmPlanDate} onChange={e=>setForm({...form,crmPlanDate:e.target.value})} className={INP}/></Fld>
            <Fld label="Actual Month"><MonthPicker value={form.actualMonth||""} onChange={v=>setForm({...form,actualMonth:v})}/></Fld>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Fld label="CRM Amt (Rs.) *"><input type="number" value={form.crmAmt} onChange={e=>setForm({...form,crmAmt:e.target.value})} className={INP}/></Fld>
            <Fld label="Tentative Business p.m. (Rs.)"><input type="number" value={form.tentativeBizPM} onChange={e=>setForm({...form,tentativeBizPM:e.target.value})} className={INP}/></Fld>
          </div>
          <Fld label="Priority">
            <select value={form.priority||"Medium"} onChange={e=>setForm({...form,priority:e.target.value})} className={INP}>
              {PRIORITIES.map(p=><option key={p}>{p}</option>)}
            </select>
          </Fld>
          <div className="flex gap-3 pt-2">
            <button onClick={()=>setModal(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200">Cancel</button>
            <button onClick={save} disabled={!form.doctorName||!form.crmAmt} className="flex-1 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-bold hover:bg-teal-700 disabled:opacity-40">{editId?"Update":"Add"}</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

/* ══════════════════════════════════
   REPORT HTML BUILDER (print / share)
══════════════════════════════════ */
function buildReportHTML(title, monthLbl, headers, rows, totalsRow) {
  const css = `*{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#1f2937}
  #reportbody{padding:20px}
  h1{font-size:19px;font-weight:800;color:#0f766e;border-bottom:3px solid #0f766e;padding-bottom:7px;margin-bottom:4px}
  .meta{font-size:11px;color:#6b7280;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;margin-top:6px}
  th{background:#0f766e;color:#fff;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;white-space:nowrap}
  td{padding:6px 8px;border-bottom:1px solid #f0f0f0;font-size:11px;white-space:nowrap}
  tr:nth-child(even) td{background:#f9fafb}
  .tf td{background:#ccfbf1;font-weight:800;border-top:2px solid #0f766e}
  #actionbar{display:flex;gap:10px;padding:12px 16px;background:#0f766e;position:sticky;top:0;z-index:100;align-items:center;flex-wrap:wrap}
  #actionbar span{color:rgba(255,255,255,0.7);font-size:12px;flex:1;min-width:120px}
  .abtn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .sharebtn{background:#25d366;color:#fff}
  .printbtn{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)}
  @media print{#actionbar{display:none!important}}`;

  const bodyRows = rows.map(r => `<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("");
  const totalsHtml = totalsRow ? `<tr class="tf">${totalsRow.map(c=>`<td>${c}</td>`).join("")}</tr>` : "";
  const shareTxt = encodeURIComponent(`📑 ${title}\n${monthLbl}\n\n` + rows.map(r=>r.join(" · ")).join("\n") + (totalsRow?`\n\nTOTAL: ${totalsRow.join(" · ")}`:"") + `\n\nGenerated by Aldan Beat Tracker`);

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>${title} – Aldan Beat Tracker</title><style>${css}</style></head><body>
  <div id="actionbar">
    <span>📑 ${title}</span>
    <button class="abtn sharebtn" id="shareBtn">📤 Share</button>
    <button class="abtn printbtn" id="printBtn">🖨️ Print / PDF</button>
  </div>
  <div id="reportbody">
    <h1>${title}</h1>
    <div class="meta">${monthLbl} · Aldan Beat Tracker · ${rows.length} doctors</div>
    <table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
    <tbody>${bodyRows}</tbody><tfoot>${totalsHtml}</tfoot></table>
  </div>
  <script>
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const textBody = decodeURIComponent('${shareTxt}');
    if (!isMobile) { window.onload = () => setTimeout(()=>window.print(), 500); }
    document.getElementById('shareBtn').onclick = async () => {
      if (navigator.share) { try { await navigator.share({ title: ${JSON.stringify(title)}, text: textBody }); } catch(e) { if (e.name!=='AbortError') window.print(); } }
      else { window.open('https://wa.me/?text=' + encodeURIComponent(textBody), '_blank'); }
    };
    document.getElementById('printBtn').onclick = () => window.print();
  <\/script>
  </body></html>`;
}

/* ══════════════════════════════════
   TAB: REPORTS
══════════════════════════════════ */
function ReportsTab({doctors, bizplan, bizFieldDefs, crmplan}) {
  const [month, setMonth] = useState("2026-06");
  const [type, setType]   = useState("biz");
  const areas = useMemo(() => Array.from(new Set(doctors.map(d=>d.area).filter(Boolean))), [doctors]);
  const [areaSel, setAreaSel] = useState("All");
  const [generating, setGenerating] = useState(false);
  const [imgModal, setImgModal] = useState(null); // dataUrl | null — in-app fallback

  const monthData = toObj(bizplan[month]);
  const bizRows = doctors
    .filter(d => areaSel==="All" || d.area===areaSel)
    .map(d => ({doc:d, entry: toObj(monthData[d.id])}))
    .filter(r => Object.keys(r.entry).some(k => r.entry[k]!==undefined && r.entry[k]!==""));

  const numFields = bizFieldDefs.filter(f=>f.type==="number");
  const bizTotals = {};
  numFields.forEach(f => { bizTotals[f.key] = bizRows.reduce((s,r)=>s+Number(r.entry[f.key]||0),0); });

  const crmRows = toArr(crmplan[month]).filter(e => areaSel==="All" || e.area===areaSel);
  const crmTotalAmt = crmRows.reduce((s,e)=>s+Number(e.crmAmt||0),0);
  const crmTotalBiz = crmRows.reduce((s,e)=>s+Number(e.tentativeBizPM||0),0);

  const generate = () => {
    let html;
    if (type==="biz") {
      const headers = ["Doctor","MDL","Area","Priority", ...bizFieldDefs.map(f=>f.label)];
      const rows = bizRows.map(r => [r.doc.name, r.doc.mdl||"—", r.doc.area, r.doc.priority||"Medium", ...bizFieldDefs.map(f => r.entry[f.key]!==undefined && r.entry[f.key]!=="" ? (f.type==="number"?fmt(r.entry[f.key]):r.entry[f.key]) : "—")]);
      const totalsRow = ["TOTAL","","","", ...bizFieldDefs.map(f=>f.type==="number"?fmt(bizTotals[f.key]):"")];
      html = buildReportHTML("Business Plan Report" + (areaSel!=="All"?` — ${areaSel}`:""), monthLabel(month), headers, rows, totalsRow);
    } else {
      const headers = ["Doctor","MDL","Area","Plan Date","Actual Month","CRM Amt","Tentative Biz p.m."];
      const rows = crmRows.map(e => [e.doctorName, e.mdl||"—", e.area, e.crmPlanDate||"—", e.actualMonth?monthLabel(e.actualMonth):"—", fmt(e.crmAmt), fmt(e.tentativeBizPM)]);
      const totalsRow = ["TOTAL","","","","", fmt(crmTotalAmt), fmt(crmTotalBiz)];
      html = buildReportHTML("CRM Plan Report" + (areaSel!=="All"?` — ${areaSel}`:""), monthLabel(month), headers, rows, totalsRow);
    }
    const win = window.open('', '_blank');
    if (!win) { alert('Popup blocked — please allow popups to view the report'); return; }
    win.document.open(); win.document.write(html); win.document.close();
  };

  const genImage = async () => {
    setGenerating(true);
    const title = type==="biz" ? "Business Plan Report" : "CRM Plan Report";
    const areaLabel = areaSel!=="All" ? ` · ${areaSel}` : "";
    const dt = new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});

    let rowsHTML = "";
    if (type==="biz") {
      rowsHTML = bizRows.map((r,i)=>`
        <tr style="background:${i%2===0?"#f9fafb":"white"}">
          <td style="padding:7px 10px;font-weight:600;color:#1f2937;">${i+1}. ${r.doc.name}</td>
          <td style="padding:7px 10px;color:#6b7280;font-size:11px;">${r.doc.mdl||"—"}</td>
          <td style="padding:7px 10px;"><span style="background:#f0fdf4;color:#16a34a;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:700;">${r.doc.area}</span></td>
          ${numFields.map(f=>`<td style="padding:7px 10px;font-weight:700;color:#0f766e;">${r.entry[f.key]!==undefined&&r.entry[f.key]!==""?fmt(r.entry[f.key]):"—"}</td>`).join("")}
        </tr>`).join("");
    } else {
      rowsHTML = crmRows.map((e,i)=>`
        <tr style="background:${i%2===0?"#f9fafb":"white"}">
          <td style="padding:7px 10px;font-weight:600;color:#1f2937;">${i+1}. ${e.doctorName}</td>
          <td style="padding:7px 10px;color:#6b7280;font-size:11px;">${e.mdl||"—"}</td>
          <td style="padding:7px 10px;"><span style="background:#f0fdf4;color:#16a34a;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:700;">${e.area}</span></td>
          <td style="padding:7px 10px;font-weight:700;color:#0f766e;">${fmt(e.crmAmt)}</td>
          <td style="padding:7px 10px;color:#6b7280;font-size:11px;">${e.actualMonth?monthLabel(e.actualMonth):"—"}</td>
        </tr>`).join("");
    }
    const bizHeader = numFields.map(f=>`<th style="padding:8px 10px;text-align:left;background:#0f766e;color:#fff;font-size:11px;">${f.label}</th>`).join("");
    const crmHeader = `<th style="padding:8px 10px;text-align:left;background:#0f766e;color:#fff;font-size:11px;">CRM Amt</th><th style="padding:8px 10px;text-align:left;background:#0f766e;color:#fff;font-size:11px;">Actual Month</th>`;
    const totalRow = type==="biz"
      ? `<tr style="background:#ccfbf1;font-weight:800;"><td colspan="3" style="padding:8px 10px;color:#0f766e;">Total</td>${numFields.map(f=>`<td style="padding:8px 10px;color:#0f766e;">${fmt(bizTotals[f.key])}</td>`).join("")}</tr>`
      : `<tr style="background:#ccfbf1;font-weight:800;"><td colspan="3" style="padding:8px 10px;color:#0f766e;">Total</td><td style="padding:8px 10px;color:#0f766e;">${fmt(crmTotalAmt)}</td><td style="padding:8px 10px;color:#0f766e;"></td></tr>`;

    const html = `<div id="rpt-card" style="width:750px;background:#ffffff;font-family:Arial,Helvetica,sans-serif;padding:32px;box-sizing:border-box;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:3px solid #0f766e;">
        <div>
          <div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;">🩺 Aldan Beat</div>
          <div style="font-size:22px;font-weight:900;color:#0f766e;">${title}</div>
          <div style="font-size:12px;color:#9ca3af;margin-top:2px;">${monthLabel(month)}${areaLabel} · ${dt}</div>
        </div>
        <div style="text-align:right;background:#f0fdf4;border-radius:12px;padding:12px 18px;">
          <div style="font-size:28px;font-weight:900;color:#0f766e;">${type==="biz"?bizRows.length:crmRows.length}</div>
          <div style="font-size:10px;color:#6b7280;">doctors</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr>
          <th style="padding:8px 10px;text-align:left;background:#0f766e;color:#fff;font-size:11px;">Doctor</th>
          <th style="padding:8px 10px;text-align:left;background:#0f766e;color:#fff;font-size:11px;">MDL</th>
          <th style="padding:8px 10px;text-align:left;background:#0f766e;color:#fff;font-size:11px;">Area</th>
          ${type==="biz"?bizHeader:crmHeader}
        </tr></thead>
        <tbody>${rowsHTML}</tbody>
        <tfoot>${totalRow}</tfoot>
      </table>
      <div style="margin-top:20px;font-size:10px;color:#d1d5db;text-align:center;padding-top:12px;border-top:1px solid #f3f4f6;">Generated by Aldan Beat · aldan healthcare pvt ltd</div>
    </div>`;

    const wrap = document.createElement("div");
    wrap.style.cssText = "position:fixed;left:-9999px;top:0;z-index:-999;";
    wrap.innerHTML = html;
    document.body.appendChild(wrap);
    try {
      await new Promise(r=>setTimeout(r,200));
      const card = wrap.querySelector("#rpt-card");
      const canvas = await html2canvas(card, {scale:2, useCORS:true, backgroundColor:"#ffffff"});
      const dataUrl = canvas.toDataURL("image/png");
      const fname = `${title.replace(/[^a-z0-9]/gi,"_")}_${month}.png`;

      // Convert dataUrl to File for native share
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      const file = new File([blob], fname, {type:"image/png"});

      if (navigator.canShare && navigator.canShare({files:[file]})) {
        // Option B: native share sheet — stays inside PWA
        try {
          await navigator.share({files:[file], title:title});
        } catch(shareErr) {
          if (shareErr.name !== "AbortError") setImgModal(dataUrl); // fallback if share fails (not cancelled)
        }
      } else {
        // Option A: in-app image modal (fallback for desktop / older iOS)
        setImgModal(dataUrl);
      }
    } catch(err) { console.error(err); alert("Image generation failed"); }
    finally { document.body.removeChild(wrap); setGenerating(false); }
  };

  const rows = type==="biz" ? bizRows : crmRows;

  return (
    <div>
      <div className="flex flex-col gap-2 mb-3">
        <div className="flex items-center gap-2 flex-wrap">
          <MonthPicker value={month} onChange={setMonth}/>
          <div className="flex gap-1.5">
            <button onClick={()=>setType("biz")} className={`px-4 py-2 rounded-lg text-sm font-bold ${type==="biz"?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>📊 Business Plan</button>
            <button onClick={()=>setType("crm")} className={`px-4 py-2 rounded-lg text-sm font-bold ${type==="crm"?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>💰 CRM Plan</button>
          </div>
        </div>
        <div className="flex gap-2 flex-wrap">
          <select value={areaSel} onChange={e=>setAreaSel(e.target.value)} className={INP + " max-w-44"}>
            <option>All</option>{areas.map(a=><option key={a}>{a}</option>)}
          </select>
          <button onClick={generate} disabled={generating} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap disabled:opacity-50">📄 PDF / Share Text</button>
          <button onClick={genImage} disabled={generating} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap disabled:opacity-50">
            {generating?"⟳ Generating…":"🖼️ WhatsApp Image"}
          </button>
        </div>
      </div>

      <p className="text-xs text-gray-400 mb-3">{monthLabel(month)} {areaSel!=="All"&&`· ${areaSel}`} · {rows.length} doctors with {type==="biz"?"a business plan":"a CRM plan"}</p>

      {type==="biz" && (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>{["Doctor","MDL","Area","Priority",...bizFieldDefs.map(f=>f.label)].map((h,i)=>(
                  <th key={i} className="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-gray-400 whitespace-nowrap">{h}</th>
                ))}</tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {bizRows.map(r=>(
                  <tr key={r.doc.id} className="hover:bg-gray-50">
                    <td className="px-3 py-2.5 font-semibold text-gray-800 whitespace-nowrap">{r.doc.name}</td>
                    <td className="px-3 py-2.5 text-xs text-gray-400">{r.doc.mdl||"—"}</td>
                    <td className="px-3 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs bg-teal-50 text-teal-700">{r.doc.area}</span></td>
                    <td className="px-3 py-2.5"><PriBadge p={r.doc.priority}/></td>
                    {bizFieldDefs.map(f=>(
                      <td key={f.key} className="px-3 py-2.5 text-xs text-gray-600 whitespace-nowrap">{r.entry[f.key]!==undefined && r.entry[f.key]!=="" && !(Array.isArray(r.entry[f.key]) && r.entry[f.key].length===0) ? (f.type==="multiselect"?(Array.isArray(r.entry[f.key])?r.entry[f.key].join(", "):String(r.entry[f.key])):(f.type==="number"?fmt(r.entry[f.key]):r.entry[f.key])) : "—"}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
              {bizRows.length>0 && (
                <tfoot><tr className="bg-teal-50 border-t-2 border-teal-200 font-black text-sm">
                  <td className="px-3 py-3 text-teal-800" colSpan={4}>Total</td>
                  {bizFieldDefs.map(f=>(<td key={f.key} className="px-3 py-3 text-teal-700">{f.type==="number"?fmt(bizTotals[f.key]):""}</td>))}
                </tr></tfoot>
              )}
            </table>
          </div>
          {bizRows.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No business plans for {monthLabel(month)} yet</div>}
        </div>
      )}

      {type==="crm" && (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>{["Doctor","MDL","Area","Plan Date","Actual Month","CRM Amt","Tentative Biz p.m."].map(h=>(
                  <th key={h} className="px-3 py-3 text-left text-xs font-bold uppercase tracking-wider text-gray-400 whitespace-nowrap">{h}</th>
                ))}</tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {crmRows.map(e=>(
                  <tr key={e.id} className="hover:bg-gray-50">
                    <td className="px-3 py-2.5 font-semibold text-gray-800 whitespace-nowrap">{e.doctorName}</td>
                    <td className="px-3 py-2.5 text-xs text-gray-400">{e.mdl||"—"}</td>
                    <td className="px-3 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs bg-teal-50 text-teal-700">{e.area}</span></td>
                    <td className="px-3 py-2.5 text-xs text-gray-500">{e.crmPlanDate||"—"}</td>
                    <td className="px-3 py-2.5 text-xs text-gray-500">{e.actualMonth?monthLabel(e.actualMonth):"—"}</td>
                    <td className="px-3 py-2.5 font-bold text-teal-700">{fmt(e.crmAmt)}</td>
                    <td className="px-3 py-2.5 font-bold text-indigo-700">{fmt(e.tentativeBizPM)}</td>
                  </tr>
                ))}
              </tbody>
              {crmRows.length>0 && (
                <tfoot><tr className="bg-teal-50 border-t-2 border-teal-200 font-black text-sm">
                  <td className="px-3 py-3 text-teal-800" colSpan={5}>Total</td>
                  <td className="px-3 py-3 text-teal-700">{fmt(crmTotalAmt)}</td>
                  <td className="px-3 py-3 text-indigo-700">{fmt(crmTotalBiz)}</td>
                </tr></tfoot>
              )}
            </table>
          </div>
          {crmRows.length===0 && <div className="text-center py-10 text-gray-300 text-sm">No CRM plans for {monthLabel(month)} yet</div>}
        </div>
      )}

      {/* ── In-app image modal (Option A fallback) ── */}
      {imgModal && (
        <div className="fixed inset-0 z-[80] flex flex-col items-center justify-center p-4" style={{background:"rgba(15,23,42,0.85)"}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div className="flex justify-between items-center px-4 py-3 border-b border-gray-100">
              <p className="text-sm font-bold text-gray-800">📷 Report Image</p>
              <button onClick={()=>setImgModal(null)} className="text-gray-300 hover:text-gray-700 text-xl font-bold">✕</button>
            </div>
            <div className="p-4">
              <img src={imgModal} alt="Report" className="w-full rounded-xl border border-gray-100"/>
              <p className="text-xs text-gray-400 text-center mt-3">Long press image → Share / Save to Photos</p>
              <button onClick={()=>setImgModal(null)} className="w-full mt-3 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
